# NeuroShot production stack: the app + Caddy for automatic HTTPS (Let's Encrypt).
#
#   1) point a DNS A record (e.g. app.example.com) at this server
#   2) fill .env  (BOT_TOKEN, FAL_KEY, ADMIN_IDS, BOT_USERNAME,
#                  WEBAPP_DOMAIN=app.example.com, WEBAPP_URL=https://app.example.com)
#   3) docker compose up -d --build
#   4) @BotFather → Bot Settings → Configure Mini App → set the same domain
#
# See docs/deploy.md for the full runbook.

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_PATH=/data/bot.db
      - WEBAPP_PORT=8080
    volumes:
      - botdata:/data
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddy provisions a certificate for this domain automatically.
      - WEBAPP_DOMAIN=${WEBAPP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  botdata:
  caddy_data:
  caddy_config:
