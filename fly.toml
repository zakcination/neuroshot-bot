# Fly.io deploy — best fit for this app: one always-on Docker VM (long polling
# needs a persistent process). State lives in Postgres (Neon) via DATABASE_URL,
# so no volume is needed. Runs bot + Mini App in one process; Fly provides public
# HTTPS (no Caddy). WEBAPP_URL both enables the 🌐 Mini App button and starts the
# web server — set it to this app's URL. To instead host the web layer on Vercel,
# point WEBAPP_URL at the Vercel URL (the button opens it; the local server keeps
# serving /healthz for the check below). See docs/vercel.md.
#
#   fly launch --no-deploy         # or: fly apps create <name>
#   fly secrets set BOT_TOKEN=... FAL_KEY=... BOT_USERNAME=neuroshot_ai_bot \
#     ADMIN_IDS=<your_tg_id[,id2,...]> WEBAPP_URL=https://<app>.fly.dev \
#     DATABASE_URL=postgresql://…-pooler.…neon.tech/…?sslmode=require
#   fly deploy
#   # then @BotFather → Configure Mini App → https://<app>.fly.dev
#
# App name is global on Fly — change it (or let `fly launch` generate one).
app = "maidanzakaryanov"
primary_region = "fra" # Frankfurt — close to RU/KZ users; pick your own (waw/Warsaw is deprecated on Fly)
# Give graceful shutdown time to drain in-flight renders (1–3 min) before SIGKILL,
# so a routine deploy/recycle delivers or refunds them (matches drainRenders in index.ts).
kill_timeout = "3m"

[build]
  dockerfile = "Dockerfile"

[env]
  WEBAPP_PORT = "8080"
  # DATABASE_URL / WEBAPP_URL / BOT_TOKEN / FAL_KEY / BOT_USERNAME / ADMIN_IDS → `fly secrets set`

# State lives in Postgres (Neon) via DATABASE_URL — no local volume needed.

[http_service]
  internal_port = 8080
  force_https = true
  # Long polling must never be paused — keep exactly one machine always running.
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "get"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
