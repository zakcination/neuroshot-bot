<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NeuroShot</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#08070c" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NeuroShot" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ————— NeuroShot design system: dark luxe, aurora accent (violet→magenta) ————— */
    :root {
      --bg: #08070c;
      --bg-2: #0d0b13;
      --surface: #14111c;
      --surface-2: #1b1726;
      --line: rgba(255, 255, 255, 0.07);
      --ink: #f4f2fa;
      --muted: #8f8aa3;
      --faint: #5e5975;
      --violet: #7c5cff;
      --magenta: #ff4d8d;
      --amber: #f5b64a;
      --aurora: linear-gradient(120deg, #7c5cff, #b44dff 45%, #ff4d8d);
      --radius: 20px;
      --radius-s: 14px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { color-scheme: dark; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      min-height: 100dvh; overflow-x: hidden;
    }
    ::selection { background: rgba(124, 92, 255, .4); }

    .sky { position: fixed; inset: -20% -30%; z-index: 0; pointer-events: none; filter: blur(90px); opacity: .5; }
    .sky i { position: absolute; border-radius: 50%; }
    .sky i:nth-child(1) { width: 55vmax; height: 55vmax; left: -12vmax; top: -18vmax; background: radial-gradient(circle, rgba(124,92,255,.5), transparent 65%); animation: drift1 26s ease-in-out infinite alternate; }
    .sky i:nth-child(2) { width: 45vmax; height: 45vmax; right: -15vmax; top: 10vmax; background: radial-gradient(circle, rgba(255,77,141,.35), transparent 65%); animation: drift2 32s ease-in-out infinite alternate; }
    @keyframes drift1 { to { transform: translate(9vmax, 7vmax) scale(1.12); } }
    @keyframes drift2 { to { transform: translate(-8vmax, -6vmax) scale(.94); } }

    .wrap { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 14px 16px calc(44px + env(safe-area-inset-bottom)); }

    .pill {
      display: inline-flex; align-items: center; gap: 6px; font-weight: 700; font-size: 13px;
      background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 7px 13px;
      font-variant-numeric: tabular-nums;
    }
    /* Header — profile + balance + in-progress count, nothing else. Telegram's
       own webview title bar already shows "NeuroShot" above this, so an in-app
       logo was a second, redundant brand mark eating space for no new info. */
    .top2 { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 2px 16px; }
    .idbox { display: flex; align-items: center; gap: 9px; flex: none; min-width: 0; }
    .idbox .nm { font-size: 13.5px; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; flex: none; object-fit: cover; border: 1.5px solid var(--line); }
    .avatar.ph { display: flex; align-items: center; justify-content: center; background: var(--aurora); font-size: 12px; font-weight: 800; color: #fff; }
    .pillrow { display: flex; gap: 6px; flex: none; }
    .pill.jobs { color: var(--amber); border-color: rgba(245,182,74,.35); }
    /* Balance pill IS the top-up entry point (tap → Патроны) — replaces the old
       wallet card's "Пополнить" button so it's reachable without a permanent
       block duplicating the balance already shown right here. */
    .pill.topup { border: 0; cursor: pointer; padding-right: 6px; font: inherit; color: var(--ink); }
    .pill.topup .plus {
      width: 15px; height: 15px; border-radius: 50%; background: var(--aurora); color: #fff;
      display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; line-height: 1; margin-right: 1px;
    }
    .pill.topup:active { transform: scale(.95); }

    /* "Ваш путь в NeuroShot" — replaces the old wallet card (balance now lives
       in the header pill). Every step is a real clickable link into the studio
       sheet (or the Друзья page); "done" reflects genuine backend signals
       (roadmapProgress in db.ts), not a fabricated progress bar. */
    .roadmap { background: var(--surface); border: 1px solid rgba(124,92,255,.28); border-radius: var(--radius); padding: 15px 15px 16px; }
    .roadmap .sec-h { margin-bottom: 11px; }
    .rsteps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .rstep {
      display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center;
      background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius-s);
      padding: 10px 4px 9px; font: inherit; color: var(--ink); cursor: pointer; transition: border-color .15s ease, transform .12s ease;
    }
    .rstep:active { transform: scale(.96); }
    .rstep .rico {
      width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; background: var(--surface); border: 1px solid var(--line);
    }
    .rstep .rlabel { font-size: 9.5px; font-weight: 700; line-height: 1.25; color: var(--muted); }
    .rstep.done { border-color: rgba(55,201,154,.4); }
    .rstep.done .rico { background: rgba(55,201,154,.16); border-color: rgba(55,201,154,.4); color: #37c99a; }
    .rstep.done .rlabel { color: var(--ink); }
    @media (max-width: 360px) { .rstep .rlabel { font-size: 8.8px; } }
    /* Reward note (before completion) / claim button (after) — makes the
       "finish all 5 steps" incentive visible, not a silent progress bar. */
    .rmnote { margin: 11px 0 0; font-size: 12px; line-height: 1.4; color: var(--muted); }
    .rmnote b { color: var(--ink); }
    .rmclaim {
      margin-top: 11px; width: 100%; appearance: none; border: 0; cursor: pointer;
      border-radius: var(--radius-s); background: var(--aurora); color: #fff; font: inherit;
      font-weight: 800; font-size: 13.5px; padding: 11px; box-shadow: 0 8px 24px rgba(180,77,255,.3);
      transition: transform .12s ease;
    }
    .rmclaim:active { transform: scale(.97); }
    .rmclaim[disabled] { opacity: .55; pointer-events: none; }
    /* Graduation state — once all 5 steps are done AND the bonus is settled, the
       full checklist has done its job. Collapse the card to a single slim row so
       a power user's studio isn't permanently topped by a dead 5-checkmark grid;
       tapping it just drops into the shoot sheet to make something new. */
    /* A completed onboarding path is removed from the studio entirely (it just
       wasted prime space); the accomplishment becomes a profile achievement
       badge (.ach) instead of a permanent row. */
    .roadmap.graduated { display: none; }
    .ach { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid rgba(55,201,154,.38); border-radius: var(--radius); padding: 13px 15px; }
    .ach .achic { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(55,201,154,.14); border: 1px solid rgba(55,201,154,.4); }
    .ach .achtx { display: flex; flex-direction: column; gap: 2px; font-weight: 800; }
    .ach .achtx small { color: var(--muted); font-size: 12px; font-weight: 600; }
    .rmgrad {
      width: 100%; display: flex; align-items: center; gap: 11px; text-align: left;
      background: transparent; border: 0; padding: 0; font: inherit; color: var(--ink); cursor: pointer;
    }
    .rmgrad .rico {
      flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 15px; background: rgba(55,201,154,.16); border: 1px solid rgba(55,201,154,.4);
    }
    .rmgrad .rgtx { display: flex; flex-direction: column; gap: 1px; font-size: 13px; font-weight: 800; }
    .rmgrad .rgtx small { font-size: 11px; font-weight: 600; color: var(--muted); }

    .btn {
      appearance: none; border: 0; cursor: pointer; border-radius: var(--radius-s);
      font: inherit; font-weight: 700; font-size: 14.5px; padding: 13px 18px; color: #fff;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; flex: 1;
      transition: transform .12s ease, filter .2s ease; text-decoration: none;
    }
    .btn:active { transform: scale(.97); }
    .btn.primary { background: var(--aurora); box-shadow: 0 8px 28px rgba(180, 77, 255, .35); }
    .btn.primary:hover { filter: brightness(1.08); }
    .btn.ghost { background: rgba(255,255,255,.06); border: 1px solid var(--line); }
    .btn.ghost:hover { background: rgba(255,255,255,.1); }
    .btn:focus-visible { outline: 2px solid var(--violet); outline-offset: 2px; }
    .btn[disabled] { opacity: .55; pointer-events: none; }

    section { margin-top: 30px; }
    /* Outcome-led hero at the top of the studio — sells the result, not the tool. */
    .hero { margin: 2px 0 18px; }
    .heroh { margin: 0; font-size: 25px; line-height: 1.12; font-weight: 800; letter-spacing: -.01em; }
    .herosub { margin: 6px 0 0; font-size: 13.5px; line-height: 1.45; color: var(--muted); }
    /* The wedge rail is the hero content, so it hugs the headline (no big top gap). */
    .hero + section { margin-top: 14px; }
    .sec-h { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 13px; }
    .sec-h h2 { margin: 0; font-size: 11.5px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); font-weight: 800; }

    .rail { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(158px, 1fr); gap: 11px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 6px; margin: 0 -16px; padding-left: 16px; padding-right: 16px; scrollbar-width: none; }
    .rail::-webkit-scrollbar { display: none; }
    .act {
      scroll-snap-align: start; position: relative; border-radius: var(--radius-s); overflow: hidden;
      background: var(--surface) center/cover no-repeat; border: 1px solid var(--line); padding: 16px 14px 14px;
      min-height: 128px; display: flex; flex-direction: column; justify-content: flex-end; gap: 4px;
      text-decoration: none; color: var(--ink); transition: transform .15s ease, border-color .2s ease; cursor: pointer;
    }
    .act:hover { transform: translateY(-3px); border-color: rgba(124,92,255,.45); }
    /* Dark aurora-tinted gradient over the card photo — text sits in the
       bottom band (heavily darkened, measured contrast >=8.9:1 against
       var(--ink) across every card); the top stays light so the photo itself
       reads, since the icon below no longer depends on the gradient for
       contrast (that's the chip's job — see .act .em). */
    .act::before {
      content: ""; position: absolute; inset: 0;
      background:
        linear-gradient(180deg, rgba(8,7,12,.05) 0%, rgba(8,7,12,.35) 50%, rgba(8,7,12,.88) 100%),
        linear-gradient(120deg, rgba(124,92,255,.16), rgba(255,77,141,.08));
    }
    /* Solid --bg chip behind the icon — the SAME pattern already used for
       every other icon in the app (.rstep .rico, .wcost .ic, .lnkrow .ic,
       .steps3 .s .ic all sit on a solid surface color, never bare). Card
       photos are arbitrary/uncontrolled, so a translucent glass icon floating
       directly on one measures ~2.7:1 contrast on average (below WCAG AA's
       3.0) and swings wildly per-photo. --bg as a fixed chip measures >=3.1:1
       for every icon regardless of the photo underneath — verified by
       sampling all 20 icons against the design tokens before picking it. */
    .act .em {
      position: relative; margin-bottom: auto; width: 38px; height: 38px; border-radius: 12px;
      background: var(--bg); border: 1px solid rgba(255,255,255,.1); box-shadow: 0 4px 14px rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .act b { position: relative; font-size: 14px; line-height: 1.25; font-weight: 700; }
    .act span { position: relative; font-size: 11.5px; color: var(--muted); }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-s); padding: 13px 10px; text-align: center; }
    .stat .n { font-size: 19px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .stat .l { color: var(--muted); font-size: 10.5px; margin-top: 3px; letter-spacing: .04em; }
    @media (max-width: 400px) { .stats { grid-template-columns: repeat(2, 1fr); } }

    /* Fixed region: 3×4 thumbnails, so the gallery keeps its footprint across
       pages and the page doesn't jump when a page has fewer items. */
    .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; align-content: start; min-height: 46vh; }
    @media (min-width: 560px) { .gallery { grid-template-columns: repeat(4, 1fr); min-height: 40vh; } }
    .pager { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 12px; }
    .pager button { min-width: 44px; height: 40px; border-radius: var(--radius-s); border: 1px solid var(--line); background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; }
    .pager button:disabled { opacity: .35; cursor: default; }
    .pager .pinfo { font-size: 14px; opacity: .7; min-width: 74px; text-align: center; }
    .shot { position: relative; aspect-ratio: 1; border-radius: var(--radius-s); overflow: hidden; background: var(--surface); border: 1px solid var(--line); display: block; transition: transform .15s ease; }
    .shot:hover { transform: scale(1.03); }
    .shot img, .shot video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .shot .tag { position: absolute; left: 7px; bottom: 7px; font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; background: rgba(0,0,0,.55); backdrop-filter: blur(6px); padding: 3px 7px; border-radius: 999px; }
    /* In-progress render card: expanding violet ripple rings over the surface. */
    .shot.pending { pointer-events: none; background: var(--surface-2); }
    .shot.pending .rip { position: absolute; inset: 0; margin: auto; width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--violet); opacity: 0; animation: ripple 2s ease-out infinite; }
    .shot.pending .rip:nth-child(2) { animation-delay: .66s; border-color: #b44dff; }
    .shot.pending .rip:nth-child(3) { animation-delay: 1.33s; border-color: var(--magenta); }
    @keyframes ripple { 0% { transform: scale(.35); opacity: .9; } 100% { transform: scale(3.4); opacity: 0; } }
    /* Cinema Studio composer: retro-segmented mode chip + model rows. */
    .seg { display: flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px; margin: 12px 0 4px; }
    .seg button { flex: 1; border: 0; background: transparent; color: var(--muted); font-weight: 700; font-size: 13.5px; padding: 9px 0; border-radius: 999px; cursor: pointer; }
    .seg button.on { background: var(--aurora); color: #fff; }
    .mlist { display: flex; flex-direction: column; gap: 8px; }
    .mrow { display: flex; justify-content: space-between; align-items: center; gap: 8px; text-align: left; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-s); padding: 11px 12px; color: var(--ink); cursor: pointer; }
    .mrow.on { border-color: var(--violet); box-shadow: 0 0 0 1px var(--violet); }
    .mrow .price { white-space: nowrap; color: var(--amber); font-weight: 700; font-size: 13px; }
    .mnote { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .stublock { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-s); padding: 10px 12px; margin-bottom: 4px; }
    .stuchip { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stuchip > span { font-weight: 700; }
    .empty {
      grid-column: 1 / -1; text-align: center; color: var(--muted); padding: 34px 18px;
      border: 1px dashed rgba(255,255,255,.14); border-radius: var(--radius-s); font-size: 13.5px; line-height: 1.6;
    }

    .packs { display: grid; gap: 11px; }
    @media (min-width: 560px) { .packs { grid-template-columns: 1fr 1fr; } }
    .pack {
      position: relative; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-s);
      padding: 16px; cursor: pointer; transition: transform .15s ease, border-color .2s ease; text-align: left;
      color: var(--ink); font: inherit;
    }
    .pack:hover { transform: translateY(-2px); border-color: rgba(124,92,255,.5); }
    .pack .amount { font-size: 21px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .pack .per { color: var(--faint); font-size: 11px; margin-top: 3px; }
    .pack .stars { font-weight: 800; color: var(--amber); font-size: 16px; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .pack .hot {
      position: absolute; top: -9px; left: 14px; font-size: 9.5px; font-weight: 800; letter-spacing: .1em;
      text-transform: uppercase; background: var(--aurora); padding: 4px 9px; border-radius: 999px; color: #fff;
    }
    .pack.best { border-color: rgba(255,77,141,.55); box-shadow: 0 6px 30px rgba(255,77,141,.12); }

    .refcard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 19px; }
    .refcard h3 { margin: 0 0 5px; font-size: 16px; }
    .refcard p { margin: 0 0 14px; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .setrow { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-s); padding: 14px 16px; }
    .setrow span { display: flex; flex-direction: column; gap: 2px; }
    .setrow small { color: var(--muted); font-size: 12px; }
    .setrow input[type=checkbox] { flex: none; width: 46px; height: 28px; appearance: none; -webkit-appearance: none; background: var(--line); border-radius: 999px; position: relative; cursor: pointer; transition: background .2s; }
    .setrow input[type=checkbox]:checked { background: var(--amber); }
    .setrow input[type=checkbox]::after { content: ""; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: transform .2s; }
    .setrow input[type=checkbox]:checked::after { transform: translateX(18px); }
    .linkrow { display: flex; gap: 9px; }
    .linkbox {
      flex: 1; min-width: 0; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius-s);
      padding: 11px 13px; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: ui-monospace, Menlo, monospace;
    }
    .copy { flex: none; width: auto; padding: 11px 15px; }

    /* Per-referral drill-down list (Друзья page) — one row per invited friend
       with a funnel-stage status chip. Purely a read over data we already have. */
    .refempty { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .reflist { display: flex; flex-direction: column; gap: 8px; }
    .refrow {
      display: flex; align-items: center; gap: 11px;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-s); padding: 11px 13px;
    }
    .rfic {
      flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      background: var(--surface-2); border: 1px solid var(--line);
    }
    .rfmeta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .rfname { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rfmeta small { color: var(--muted); font-size: 11px; }
    .rfchip { flex: 0 0 auto; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 999px; border: 1px solid transparent; }
    .rfchip.paid { color: #37c99a; background: rgba(55,201,154,.14); border-color: rgba(55,201,154,.38); }
    .rfchip.free { color: #b48dff; background: rgba(124,92,255,.14); border-color: rgba(124,92,255,.36); }
    .rfchip.idle { color: var(--muted); background: var(--surface-2); border-color: var(--line); }

    /* "Ещё" tab — the About card + link groups (Друзья/Помощь/О проекте/Связаться). */
    .aboutcard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px 19px; }
    .ac-hero { display: flex; margin-bottom: 12px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 800; letter-spacing: .1em;
      color: var(--ink); background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px;
    }
    .badge i { width: 6px; height: 6px; border-radius: 50%; background: var(--violet); box-shadow: 0 0 8px var(--violet); }
    .aboutcard h2 { margin: 0 0 8px; font-size: 19px; letter-spacing: -.01em; }
    .aboutcard h2 span { color: var(--violet); }
    .aboutcard p { margin: 0 0 16px; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .steps3 { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; align-items: center; gap: 4px; margin-bottom: 16px; }
    .steps3 .s { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
    .steps3 .s .ic { width: 40px; height: 40px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .steps3 .s small { font-size: 10.5px; font-weight: 700; }
    .steps3 .ar { color: var(--faint); font-size: 13px; }
    .valuebar {
      display: flex; align-items: center; gap: 10px; padding: 12px 13px; border-radius: 13px; margin-bottom: 16px;
      background: linear-gradient(100deg, rgba(124,92,255,.16), rgba(255,77,141,.06)); border: 1px solid rgba(124,92,255,.28);
    }
    .valuebar .em { font-size: 20px; flex: none; }
    .valuebar p { margin: 0; font-size: 12px; }
    .lnkrow {
      display: flex; align-items: center; gap: 11px; padding: 14px 15px; border-radius: var(--radius-s);
      background: var(--surface); border: 1px solid var(--line); font-size: 13.5px; color: var(--ink);
      cursor: pointer; transition: border-color .15s ease;
    }
    .lnkrow:hover { border-color: rgba(124,92,255,.4); }
    .lnkrow .ic { width: 32px; height: 32px; border-radius: 10px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 15px; flex: none; }
    .lnkrow .tx { flex: 1; }
    .lnkrow .tx small { display: block; color: var(--muted); font-size: 11px; margin-top: 1px; }
    .lnkrow .chev { color: var(--faint); flex: none; }

    /* Custom icon set (public/img/ic-*.png) — sized like an emoji glyph (1em) so
       it drops into any font-sized container (tabbar, rail cards, pills, roadmap)
       without per-spot sizing rules. Premium glass/aurora style, generated to
       match the app's own palette — see docs/web-app.md. */
    .appicon { width: 1em; height: 1em; display: inline-block; vertical-align: -0.15em; object-fit: contain; }

    /* ————— welcome / first-launch onboarding ————— */
    .welcome {
      position: fixed; inset: 0; z-index: 70; background: var(--bg); display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) 16px calc(16px + env(safe-area-inset-bottom));
    }
    .wskip {
      align-self: flex-end; background: none; border: 0; color: var(--muted); font: inherit; font-size: 13px;
      font-weight: 700; padding: 14px 2px 4px; cursor: pointer;
    }
    .wslides { flex: 1; overflow: hidden; position: relative; max-width: 560px; margin: 0 auto; width: 100%; }
    .wslide { display: none; height: 100%; overflow-y: auto; -ms-overflow-style: none; scrollbar-width: none; }
    .wslide::-webkit-scrollbar { display: none; }
    .wslide.on { display: block; animation: pagein .22s ease; }
    .whero { position: relative; border-radius: 18px; overflow: hidden; margin: 6px 0 16px; aspect-ratio: 16/11; }
    .whero img { width: 100%; height: 100%; object-fit: cover; display: block; animation: wkenburns 16s ease-in-out infinite alternate; }
    .whero::after {
      content: ""; position: absolute; inset: 0;
      background:
        linear-gradient(180deg, rgba(8,7,12,0) 28%, rgba(8,7,12,.6) 72%, rgba(8,7,12,.94) 100%),
        linear-gradient(120deg, rgba(124,92,255,.22), rgba(255,77,141,.1));
    }
    .wsparkles i {
      position: absolute; width: 3px; height: 3px; border-radius: 50%; background: #fff;
      box-shadow: 0 0 8px 2px rgba(255,255,255,.85); animation: wtwinkle 3.2s ease-in-out infinite;
    }
    .whero .wherotext { position: absolute; left: 16px; right: 16px; bottom: 14px; z-index: 2; }
    .kicker { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: rgba(255,255,255,.75); font-weight: 700; margin-bottom: 4px; }
    .whero h2 { font-size: 21px; font-weight: 800; letter-spacing: -.01em; color: #fff; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,.5); }
    @keyframes wkenburns { from { transform: scale(1); } to { transform: scale(1.11); } }
    @keyframes wtwinkle { 0%, 100% { opacity: .12; transform: scale(.6); } 50% { opacity: 1; transform: scale(1); } }
    .wslide > p.lead { font-size: 14px; color: var(--muted); margin: 0 0 18px; line-height: 1.55; }
    .wcosts { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }
    .wcost { display: flex; align-items: center; gap: 11px; padding: 12px 13px; border-radius: 14px; background: var(--surface); border: 1px solid var(--line); }
    .wcost .ic { width: 34px; height: 34px; border-radius: 11px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex: none; }
    .wcost .tx { flex: 1; font-size: 13.5px; font-weight: 700; }
    .wcost .tx small { display: block; color: var(--muted); font-size: 11px; font-weight: 500; margin-top: 1px; }
    .wcost .px { font-size: 13.5px; font-weight: 800; color: var(--amber); flex: none; }
    .wnote {
      display: flex; gap: 9px; padding: 12px 13px; border-radius: 13px; margin-bottom: 6px;
      background: rgba(124,92,255,.1); border: 1px solid rgba(124,92,255,.25); font-size: 12.5px; color: var(--muted); line-height: 1.5;
    }
    .wladder { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .wrow { display: flex; align-items: center; gap: 12px; padding: 12px 13px; border-radius: 14px; background: var(--surface); border: 1px solid var(--line); position: relative; }
    .wrow.best { border-color: rgba(245,182,74,.5); background: linear-gradient(100deg, rgba(245,182,74,.12), rgba(124,92,255,.06)); }
    .wrow .wt { flex: 1; }
    .wrow .wt b { display: block; font-size: 13.5px; }
    .wrow .wt small { font-size: 11px; color: var(--muted); }
    .wrow .wp { text-align: right; flex: none; }
    .wrow .wp b { display: block; font-size: 14px; font-variant-numeric: tabular-nums; }
    .wrow .wp small { font-size: 10px; color: #37c99a; font-weight: 800; }
    .wrow .tag {
      position: absolute; top: -8px; right: 11px; font-size: 8.5px; font-weight: 800; letter-spacing: .03em;
      background: var(--amber); color: #241a06; padding: 2px 7px; border-radius: 6px;
    }
    .wgiftbox {
      text-align: center; padding: 24px 16px 20px; border-radius: 18px; margin-bottom: 16px;
      background: linear-gradient(160deg, rgba(124,92,255,.16), rgba(255,77,141,.08)); border: 1px solid rgba(124,92,255,.28);
    }
    .wgiftbox .gn { font-size: 38px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .wgiftbox .gn span { font-size: 19px; vertical-align: 2px; }
    .wgiftbox .gd { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
    /* "Already received" state — a green success treatment (matches .rstep.done
       elsewhere) instead of a checkmark glyph; the caption reads bold, not muted. */
    .wgiftbox.received { background: rgba(55,201,154,.14); border-color: rgba(55,201,154,.4); }
    .wgiftbox.received .gd { font-weight: 800; color: #37c99a; font-size: 13.5px; }
    .wclaim {
      width: 100%; border: 0; border-radius: 16px; padding: 16px; font: inherit; font-weight: 800; font-size: 14.5px;
      color: #fff; background: var(--aurora); box-shadow: 0 12px 26px rgba(180,77,255,.4); cursor: pointer; margin-bottom: 8px;
    }
    .wclaim:active { transform: scale(.98); }
    .wclaim.done { background: rgba(55,201,154,.14); color: #37c99a; box-shadow: none; border: 1px solid rgba(55,201,154,.35); }
    .wclaim[disabled] { pointer-events: none; }
    .wskipclaim { display: block; width: 100%; background: none; border: 0; color: var(--faint); font: inherit; font-size: 12.5px; font-weight: 700; padding: 8px; cursor: pointer; text-align: center; }
    .wtour {
      display: flex; align-items: center; gap: 11px; padding: 13px; border-radius: 14px; margin-top: 6px;
      background: var(--surface-2); border: 1px solid var(--line); cursor: pointer;
    }
    .wtour .ic { font-size: 19px; flex: none; }
    .wtour .tx { flex: 1; font-size: 13px; font-weight: 700; }
    .wtour .tx small { display: block; color: var(--muted); font-size: 11px; font-weight: 500; margin-top: 1px; }
    .wtour .chev { color: var(--faint); }
    .wnext { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 4px 4px; max-width: 560px; margin: 0 auto; width: 100%; }
    .wdots { display: flex; gap: 6px; }
    .wdots i { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); }
    .wdots i.on { width: 18px; border-radius: 3px; background: var(--aurora); }
    .wnextbtn { border: 0; border-radius: 13px; padding: 11px 20px; font: inherit; font-weight: 800; font-size: 13.5px; color: #fff; background: var(--aurora); cursor: pointer; }
    @media (prefers-reduced-motion: reduce) { .whero img, .wsparkles i { animation: none; } }

    footer { margin-top: 34px; text-align: center; color: var(--faint); font-size: 11px; letter-spacing: .05em; }

    .reveal { opacity: 0; transform: translateY(14px); transition: opacity .5s ease, transform .5s ease; }
    .reveal.on { opacity: 1; transform: none; }

    /* Multipage: 4 pages toggled by the bottom tab bar. */
    .wrap { padding-bottom: 88px; }
    .page { display: none; }
    .page.on { display: block; animation: pagein .22s ease; }
    @keyframes pagein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .tabbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60; display: flex; max-width: 640px; margin: 0 auto; background: rgba(8,7,12,.94); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(--line); padding: 6px 4px calc(6px + env(safe-area-inset-bottom, 0px)); }
    .tabbtn { flex: 1; background: none; border: 0; color: var(--muted); font: inherit; font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 5px 0; border-radius: 10px; transition: color .15s; }
    .tabbtn span { font-size: 21px; line-height: 1; filter: grayscale(.4); transition: filter .15s; }
    .tabbtn.on { color: var(--text); }
    .tabbtn.on span { filter: none; }
    .buyhint { color: var(--muted); font-size: 12px; margin: 12px 2px 0; line-height: 1.5; }
    /* Exchange-rate transparency above the pack tiles: the patron↔₸ rate at a glance. */
    .ratenote { color: var(--muted); font-size: 12.5px; margin: -4px 2px 13px; line-height: 1.45; font-variant-numeric: tabular-nums; }

    .skel { border-radius: var(--radius); height: 170px; background: linear-gradient(100deg, var(--surface) 40%, var(--surface-2) 50%, var(--surface) 60%); background-size: 200% 100%; animation: shimmer 1.3s infinite; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .gate { text-align: center; padding: 12vh 20px 0; }
    .gate .dot { width: 62px; height: 62px; border-radius: 20px; background: var(--aurora); margin: 0 auto 22px; box-shadow: 0 0 60px rgba(180,77,255,.5); }
    .gate h1 { font-size: 30px; margin: 0 0 10px; letter-spacing: -.02em; font-weight: 800; }
    .gate p { color: var(--muted); margin: 0 auto 26px; max-width: 34ch; line-height: 1.6; }
    .gate .btn { max-width: 280px; margin: 0 auto; }

    /* ————— studio sheet ————— */
    .sheet-bg { position: fixed; inset: 0; z-index: 40; background: rgba(4,3,8,.6); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .25s ease; }
    .sheet-bg.on { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; z-index: 41; left: 0; right: 0; bottom: 0; margin: 0 auto; max-width: 720px;
      background: var(--bg-2); border: 1px solid var(--line); border-bottom: 0;
      border-radius: 24px 24px 0 0; padding: 10px 16px calc(20px + env(safe-area-inset-bottom));
      max-height: 88dvh; overflow-y: auto; transform: translateY(102%);
      /* visibility flips AFTER the slide-out so the closed sheet can never leak into view */
      visibility: hidden; transition: transform .3s cubic-bezier(.2,.9,.3,1), visibility 0s .3s;
    }
    .sheet.on { transform: none; visibility: visible; transition: transform .3s cubic-bezier(.2,.9,.3,1); }
    .grip { width: 42px; height: 4px; border-radius: 4px; background: rgba(255,255,255,.18); margin: 4px auto 14px; }
    /* Sticky sheet header so the close (✕) is always reachable, even in a long/scrolled sheet. */
    .sheet-top { position: sticky; top: 0; z-index: 4; margin: -10px -16px 6px; padding: 8px 16px 2px; background: var(--bg-2); }
    .sheet-top .grip { margin: 4px auto 6px; }
    .sheet-x { position: absolute; top: 6px; right: 10px; width: 32px; height: 32px; border-radius: 999px; border: 0; background: rgba(255,255,255,.1); color: #fff; font-size: 15px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .sheet-x:active { background: rgba(255,255,255,.2); }
    .sheet h3 { margin: 2px 0 14px; font-size: 18px; letter-spacing: -.01em; }
    .sheet .sub { color: var(--muted); font-size: 13px; margin: -8px 0 16px; line-height: 1.5; }

    .tabs { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; margin-bottom: 16px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: none; border: 1px solid var(--line); background: var(--surface); color: var(--muted);
      border-radius: 999px; padding: 8px 14px; font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .tab.on { background: var(--aurora); color: #fff; border-color: transparent; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .choice {
      position: relative; text-align: left; background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius-s); padding: 14px; color: var(--ink); font: inherit; cursor: pointer;
      display: flex; flex-direction: column; gap: 4px; min-height: 84px; transition: border-color .15s ease, transform .12s ease;
    }
    .choice:active { transform: scale(.98); }
    .choice:hover { border-color: rgba(124,92,255,.5); }
    .choice b { font-size: 14px; line-height: 1.3; }
    .choice .price { margin-top: auto; font-size: 12px; color: var(--amber); font-weight: 700; }
    .choice .desc { font-size: 11.5px; color: var(--muted); }

    /* Style Gallery — marketplace-style preset cards (preview photo, price,
       real usage/trending) replacing the plain text choice list for the
       фото/товар tabs. See docs/prompt-library.md. */
    .pcards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pcard {
      position: relative; border-radius: var(--radius-s); overflow: hidden; border: 1px solid var(--line);
      aspect-ratio: 3/4; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 10px 9px;
      text-align: left; color: var(--ink); font: inherit; cursor: pointer; background: var(--surface);
      transition: transform .12s ease, border-color .15s ease;
    }
    .pcard:active { transform: scale(.97); }
    .pcard:hover { border-color: rgba(124,92,255,.5); }
    .pcard .pbg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    /* Same dark aurora-tinted gradient as .act — legible text over an
       arbitrary/uncontrolled preview photo. */
    .pcard::after {
      content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(180deg, rgba(8,7,12,.05) 0%, rgba(8,7,12,.4) 50%, rgba(8,7,12,.92) 100%);
    }
    /* No-art fallback (preset shipped before its preview generation ran, or
       the image failed to load) — flat brand gradient + the preset's own
       emoji, never a broken image. */
    .pcard.noart .pbg { display: none; }
    .pcard.noart::after {
      background: linear-gradient(160deg, rgba(124,92,255,.4), rgba(255,77,141,.3)), linear-gradient(180deg, rgba(8,7,12,0) 40%, rgba(8,7,12,.88) 100%);
    }
    .pcard .ptop { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: auto; }
    .pcard .pemoji {
      display: none; flex: none; width: 36px; height: 36px; border-radius: 11px; align-items: center; justify-content: center;
      font-size: 17px; background: var(--bg); border: 1px solid rgba(255,255,255,.1); box-shadow: 0 4px 14px rgba(0,0,0,.35);
    }
    .pcard.noart .pemoji { display: flex; }
    .pcard .ptrend {
      margin-left: auto; font-size: 9.5px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
      background: var(--amber); color: #08070c; padding: 3px 7px; border-radius: 999px; white-space: nowrap;
    }
    .pcard b { position: relative; z-index: 2; font-size: 13px; line-height: 1.3; }
    .pcard .prow { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: baseline; gap: 6px; margin-top: 3px; }
    .pcard .price { font-size: 12px; color: var(--amber); font-weight: 700; white-space: nowrap; }
    .pcard .pcount { font-size: 10px; color: var(--muted); }

    /* news banner — sliding model headlines */
    .news { margin: 16px 0 4px; }
    .newsrail { display: grid; grid-auto-flow: column; grid-auto-columns: 86%; gap: 11px; overflow-x: auto; scroll-snap-type: x mandatory; margin: 0 -16px; padding: 0 16px 6px; scrollbar-width: none; }
    .newsrail::-webkit-scrollbar { display: none; }
    .newscard {
      scroll-snap-align: center; position: relative; overflow: hidden; cursor: pointer;
      border-radius: var(--radius); padding: 16px 16px 15px; border: 1px solid rgba(124,92,255,.35);
      background: radial-gradient(130% 140% at 100% 0%, rgba(255,77,141,.22), transparent 55%), var(--surface);
      display: flex; flex-direction: column; gap: 8px; min-height: 96px; color: var(--ink); font: inherit; text-align: left;
    }
    .newscard .chiprow { display: flex; align-items: center; gap: 7px; }
    .newscard .ntag { font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; background: var(--aurora); color: #fff; padding: 3px 8px; border-radius: 999px; }
    .newscard .free { font-size: 10px; font-weight: 800; letter-spacing: .06em; color: #08070c; background: var(--amber); padding: 3px 8px; border-radius: 999px; }
    .newscard b { font-size: 15px; line-height: 1.3; }
    .newscard .go { margin-top: auto; font-size: 12.5px; color: var(--violet); font-weight: 700; }
    .newsdots { display: flex; justify-content: center; gap: 6px; margin-top: 4px; }
    .newsdots i { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.2); transition: background .2s, width .2s; }
    .newsdots i.on { width: 16px; border-radius: 3px; background: var(--violet); }

    /* live price badge in the composer */
    .priceBadge { display: inline-flex; align-items: center; gap: 6px; font-weight: 800; color: var(--amber); font-size: 15px; font-variant-numeric: tabular-nums; }

    /* quiz chips (story builder) */
    .quiz-q { font-size: 13px; font-weight: 700; color: var(--muted); margin: 14px 0 8px; }
    .hint { font-size: 12px; color: var(--muted); margin: 6px 0 2px; opacity: .85; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      border: 1px solid var(--line); background: var(--surface); color: var(--ink);
      border-radius: 999px; padding: 8px 13px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .chip.on { background: var(--aurora); border-color: transparent; color: #fff; }
    input.words {
      width: 100%; background: var(--surface); color: var(--ink); border: 1px solid var(--line);
      border-radius: var(--radius-s); padding: 12px 14px; font: inherit; font-size: 14px; margin-top: 8px;
    }
    input.words:focus { outline: 2px solid rgba(124,92,255,.5); }

    /* "from my works" source strip */
    .mini { display: grid; grid-auto-flow: column; grid-auto-columns: 74px; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 4px 2px; }
    .mini::-webkit-scrollbar { display: none; }
    .mini img { width: 74px; height: 74px; object-fit: cover; border-radius: 12px; border: 2px solid transparent; cursor: pointer; display: block; }
    .mini img.on { border-color: var(--violet); box-shadow: 0 0 14px rgba(124,92,255,.5); }

    .drop {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; text-align: center;
      border: 1.5px dashed rgba(124,92,255,.5); border-radius: var(--radius); background: rgba(124,92,255,.06);
      padding: 34px 18px; cursor: pointer; transition: background .2s ease;
    }
    .drop:hover { background: rgba(124,92,255,.12); }
    .drop .em { font-size: 34px; }
    .drop b { font-size: 15px; }
    .drop span { color: var(--muted); font-size: 12.5px; }
    .drop input { display: none; }
    .photo-preview { position: relative; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--line); }
    .photo-preview img { width: 100%; max-height: 42dvh; object-fit: contain; display: block; background: #000; }
    .photo-preview .redo { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.55); backdrop-filter: blur(6px); border: 0; color: #fff; border-radius: 999px; padding: 8px 13px; font: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer; }

    textarea.prompt {
      width: 100%; background: var(--surface); color: var(--ink); border: 1px solid var(--line);
      border-radius: var(--radius-s); padding: 13px 14px; font: inherit; font-size: 14px; resize: vertical; min-height: 84px;
    }
    textarea.prompt:focus { outline: 2px solid rgba(124,92,255,.5); }

    .progress { text-align: center; padding: 26px 10px 10px; }
    .orb { width: 74px; height: 74px; margin: 0 auto 18px; border-radius: 26px; background: var(--aurora); box-shadow: 0 0 60px rgba(180,77,255,.5); animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 50% { transform: scale(1.12); filter: brightness(1.2); } }
    .progress h4 { margin: 0 0 6px; font-size: 17px; }
    .progress p { color: var(--muted); margin: 0; font-size: 13px; }

    .result-media { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--line); background: #000; }
    .result-media img, .result-media video { width: 100%; max-height: 52dvh; object-fit: contain; display: block; }
    .row { display: flex; gap: 10px; margin-top: 14px; }
    .stack { display: grid; gap: 10px; margin-top: 14px; }

    .toast {
      position: fixed; z-index: 60; left: 50%; bottom: calc(28px + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(20px);
      background: var(--surface-2); border: 1px solid var(--line); color: var(--ink); border-radius: 999px;
      padding: 11px 18px; font-size: 13.5px; font-weight: 600; opacity: 0; pointer-events: none; transition: all .25s ease;
      max-width: 90vw; text-align: center;
    }
    .toast.on { opacity: 1; transform: translateX(-50%); }

    @media (prefers-reduced-motion: reduce) {
      .sky i, .orb, .shot.pending .rip { animation: none; }
      .shot.pending .rip { opacity: .5; transform: scale(1.6); } /* static ring instead of ripple */
      .reveal { opacity: 1; transform: none; transition: none; }
      .btn, .act, .shot, .pack, .sheet, .sheet-bg, .pcard { transition: none; }
    }
  </style>
</head>
<body>
  <div class="sky" aria-hidden="true"><i></i><i></i></div>
  <div class="wrap" id="root">
    <div class="skel"></div>
  </div>
  <div class="sheet-bg" id="sheetBg"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true"><div class="sheet-top"><div class="grip"></div><button class="sheet-x" id="sheetX" type="button" aria-label="Закрыть">✕</button></div><div id="sheetBody"></div></div>
  <div class="welcome" id="welcome" role="dialog" aria-modal="true" style="display:none"></div>
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready(); tg?.expand();
    try { tg?.setHeaderColor?.("#08070c"); tg?.setBackgroundColor?.("#08070c"); } catch (e) { /* older clients */ }

    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});

    // Patron currency mark — the one place to rebrand it. Swap to a different emoji
    // or an <img> tag here and it updates everywhere in the Mini App (mirrors
    // UNIT_EMOJI in src/text.ts). scripts/check-patron-emoji.mjs guards against
    // raw patron-emoji literals sneaking back in outside this definition.
    const PATRON = "\u{1F52B}";
    const $ = (h) => { const t = document.createElement("template"); t.innerHTML = h.trim(); return t.content.firstChild; };
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const plural = (n, one, few, many) => { const m100 = Math.abs(n) % 100, m10 = Math.abs(n) % 10;
      return m100 >= 11 && m100 <= 14 ? many : m10 === 1 ? one : m10 >= 2 && m10 <= 4 ? few : many; };

    // Session auth: inside Telegram exchange fresh initData for a Bearer token;
    // outside (installed PWA / browser) reuse the cached token.
    const TOKEN_KEY = "neuroshot_session";
    let AUTH = "";
    async function authHeader() {
      if (AUTH) return AUTH;
      const initData = tg?.initData || "";
      if (initData) {
        try {
          const r = await fetch("/api/auth", { method: "POST", headers: { Authorization: "tma " + initData } });
          if (r.ok) { const d = await r.json(); localStorage.setItem(TOKEN_KEY, d.token); return (AUTH = "Bearer " + d.token); }
        } catch (e) { /* fall through to raw initData */ }
        return (AUTH = "tma " + initData);
      }
      const tok = localStorage.getItem(TOKEN_KEY);
      return (AUTH = tok ? "Bearer " + tok : "");
    }
    async function api(path, opts = {}) {
      const auth = await authHeader();
      const headers = Object.assign({ Authorization: auth }, opts.body ? { "Content-Type": "application/json" } : {});
      const r = await fetch(path, Object.assign({}, opts, { headers }));
      let d = null; try { d = await r.json(); } catch (e) { /* non-JSON error */ }
      return { status: r.status, data: d };
    }

    function openBot(username, payload) {
      const url = "https://t.me/" + username + (payload ? "?start=" + payload : "");
      if (tg?.initData) tg.openTelegramLink(url); else location.href = url;
    }
    function toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("on");
      clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("on"), 2600);
    }
    function haptic(kind) { try { tg?.HapticFeedback?.notificationOccurred?.(kind); } catch (e) { /* optional */ } }

    function reveal() {
      const io = new IntersectionObserver((es) => es.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add("on"); io.unobserve(e.target); }
      }), { threshold: 0.12 });
      document.querySelectorAll(".reveal").forEach((el, i) => { el.style.transitionDelay = Math.min(i * 60, 240) + "ms"; io.observe(el); });
    }
    function gate(text, btnLabel, href) {
      document.getElementById("root").innerHTML = "";
      document.getElementById("root").appendChild($(`
        <div class="gate">
          <div class="dot"></div>
          <h1>NeuroShot</h1>
          <p>${text}</p>
          <a class="btn primary" href="${href}">${btnLabel}</a>
        </div>`));
    }

    // ————— welcome / first-launch onboarding —————
    // Shown whenever the welcome bonus is unclaimed (see claimWelcomeBonus in
    // db.ts) — a brand-new signup, or a returning user who tapped "Продолжить
    // без патронов" last time. There's no separate "seen it" flag: /api/me is
    // the single source of truth, so the claim is never permanently stranded —
    // it just resurfaces on the next open until actually claimed.
    function sparklesHtml() {
      return `<span class="wsparkles"><i style="left:12%;top:18%;animation-delay:.2s"></i>` +
        `<i style="left:80%;top:14%;animation-delay:1.1s"></i>` +
        `<i style="left:42%;top:34%;animation-delay:.6s"></i>` +
        `<i style="left:86%;top:46%;animation-delay:1.8s"></i>` +
        `<i style="left:22%;top:52%;animation-delay:2.3s"></i></span>`;
    }
    function heroHtml(img, step, title) {
      return `<div class="whero"><img src="${img}" alt="" />${sparklesHtml()}` +
        `<div class="wherotext"><div class="kicker">Шаг ${step} из 5</div><h2>${title}</h2></div></div>`;
    }
    function closeWelcome() {
      document.getElementById("welcome").style.display = "none";
      if (ME) ME.onboardingSeen = true;
      api("/api/ack-onboarding", { method: "POST" }).catch(() => {});
    }

    /** force=true replays the slideshow on demand (the "Ещё" tab link),
     *  bypassing the onboardingSeen gate that otherwise limits it to once. */
    function renderWelcome(d, force) {
      const wb = d.welcomeBonus || { pending: 0, claimed: true };
      if (!force && d.onboardingSeen) return;
      const claimable = !wb.claimed && wb.pending > 0;
      const el = document.getElementById("welcome");
      const c = d.catalog;
      const videoMin = c.videoModels.reduce((a, m) => Math.min(a, m.credits), 1e9);
      const packs = [...(d.packs || [])].filter((p) => !p.offer).sort((a, b) => a.kzt - b.kzt);
      const cheapestId = packs.reduce((best, p) => (!best || p.kzt / p.credits < best.kzt / best.credits) ? p : best, null)?.id;
      const presetSample = c.presets.slice(0, 4);

      el.innerHTML = `
        <button class="wskip" id="wskipbtn">Пропустить</button>
        <div class="wslides">
          <div class="wslide on" data-slide="0">
            ${heroHtml("/img/onboard-product.jpg", 1, "Добро пожаловать в NeuroShot")}
            <p class="lead">Загружаете фото — ИИ проводит его через стиль и монтаж и
            отдаёт готовый результат: портрет, карточку товара или видео-сюжет.
            Никакого фотошопа руками — одно фото и пара тапов.</p>
            <div class="steps3">
              <div class="s"><div class="ic"><img class="appicon" src="/img/ic-camera.png" alt="" /></div><small>Фото</small></div>
              <div class="ar">→</div>
              <div class="s"><div class="ic"><img class="appicon" src="/img/ic-palette.png" alt="" /></div><small>Стиль</small></div>
              <div class="ar">→</div>
              <div class="s"><div class="ic"><img class="appicon" src="/img/ic-sparkle.png" alt="" /></div><small>Результат</small></div>
            </div>
            <div class="wnote"><span>💡</span><span>Дальше — 3 коротких экрана: как
            устроена оплата, почему выгодно покупать больше и как забрать бесплатный старт.</span></div>
          </div>

          <div class="wslide" data-slide="1">
            ${heroHtml("/img/onboard-patron.jpg", 2, "Патрон — ваша валюта здесь")}
            <p class="lead"><b>${PATRON} патрон</b> — внутренняя валюта NeuroShot. Им вы
            платите за каждый результат. Патроны не сгорают и списываются, только
            когда вы сами запускаете генерацию — никаких скрытых списаний.</p>
            <div class="wcosts">
              <div class="wcost"><span class="ic"><img class="appicon" src="/img/ic-frame.png" alt="" /></span><span class="tx">Фото<small>портрет, карточка товара, стиль</small></span><span class="px">от ${c.presetCredits} ${PATRON}</span></div>
              <div class="wcost"><span class="ic"><img class="appicon" src="/img/ic-film.png" alt="" /></span><span class="tx">Видео<small>сцена с движением и озвучкой</small></span><span class="px">от ${videoMin} ${PATRON}</span></div>
            </div>
            <div class="wnote"><span>ℹ️</span><span>Цена патрона зависит от пакета —
            дальше покажем на цифрах.</span></div>
          </div>

          <div class="wslide" data-slide="2">
            ${heroHtml("/img/onboard-pricing.jpg", 3, "Чем больше патронов — тем дешевле")}
            <p class="lead">Цена за один патрон падает с каждым пакетом — как оптовая
            скидка. Берёте про запас — платите меньше за каждый результат.</p>
            <div class="wladder">${packs.map((p) => {
              const per = Math.round(p.kzt / p.credits);
              const best = p.id === cheapestId;
              return `<div class="wrow ${best ? "best" : ""}">${best ? `<span class="tag">Выгоднее всего</span>` : ""}` +
                `<div class="wt"><b>${esc(p.title.split(" — ")[0])}</b><small>${p.credits} ${PATRON} · ${p.kzt.toLocaleString("ru-RU")} ₸</small></div>` +
                `<div class="wp"><b>${per} ₸</b><small>за ${PATRON}</small></div></div>`;
            }).join("")}</div>
            <div class="wnote"><span>💳</span><span>Оплата — картой через Kaspi,
            патроны зачисляются автоматически. Докупить можно в любой момент во
            вкладке «Патроны».</span></div>
          </div>

          <div class="wslide" data-slide="3">
            ${heroHtml("/img/onboard-presets.jpg", 4, "Придумывать промпты не нужно")}
            <p class="lead">Загружаете фото, выбираете готовый пресет — результат
            собирает сам ИИ. Никаких промптов, формулировок и подбора слов.</p>
            <div class="wcosts">${presetSample.map((p) =>
              `<div class="wcost"><span class="ic"><img class="appicon" src="/img/ic-sparkle.png" alt="" /></span><span class="tx">${esc(p.label)}<small>готовый пресет — просто выберите</small></span></div>`).join("")}</div>
            <div class="wnote"><span>📚</span><span>Пресетов уже много — библиотека
            растёт: мы регулярно добавляем новые сценарии, чтобы результат был
            классным при минимуме действий с вашей стороны.</span></div>
          </div>

          <div class="wslide" data-slide="4">
            ${heroHtml("/img/onboard-gift.jpg", 5, claimable ? "Ваш бесплатный старт" : "Вы уже в деле!")}
            ${claimable ? `
              <div class="wgiftbox"><div class="gn">${wb.pending}<span><img class="appicon" src="/img/ic-patron.png" alt="" /></span></div><div class="gd">бесплатно — без карты и оплаты</div></div>
              <p class="lead" style="text-align:center">Это ваш пробный набор — попробуйте
              студию без риска. Патроны придут на баланс только после того, как вы
              нажмёте кнопку ниже.</p>
              <button class="wclaim" id="wclaimbtn">🎁 Получить ${wb.pending} бесплатно</button>
              <button class="wskipclaim" id="wskipclaimbtn">Продолжить без патронов</button>
            ` : `
              <div class="wgiftbox received"><div class="gn"><img class="appicon" src="/img/ic-patron.png" alt="" /></div><div class="gd">Вы уже получили стартовые патроны</div></div>
              <p class="lead" style="text-align:center">Вы уже забирали бесплатный старт —
              самое время продолжить создавать.</p>
              <button class="wclaim" id="wdonebtn">Погнали! →</button>
            `}
            <div class="wtour" id="wtourbtn" style="display:none">
              <span class="ic"><img class="appicon" src="/img/ic-compass.png" alt="" /></span><span class="tx">Короткий тур по студии<small>«Ваш путь в NeuroShot» — 5 шагов</small></span><span class="chev">›</span>
            </div>
          </div>
        </div>

        <div class="wnext" id="wnextrow">
          <div class="wdots"><i class="on"></i><i></i><i></i><i></i><i></i></div>
          <button class="wnextbtn" id="wnextbtn">Далее</button>
        </div>`;

      el.style.display = "flex";

      const wslides = el.querySelectorAll(".wslide");
      const wdots = el.querySelectorAll(".wdots i");
      const wnextbtn = document.getElementById("wnextbtn");
      const wnextrow = document.getElementById("wnextrow");
      let wcur = 0;
      function goSlide(i) {
        wcur = Math.max(0, Math.min(wslides.length - 1, i));
        wslides.forEach((s, idx) => s.classList.toggle("on", idx === wcur));
        wdots.forEach((dot, idx) => dot.classList.toggle("on", idx === wcur));
        wnextrow.style.display = wcur === wslides.length - 1 ? "none" : "";
      }
      wnextbtn.onclick = () => goSlide(wcur + 1);
      document.getElementById("wskipbtn").onclick = () => goSlide(wslides.length - 1);
      const openStudioTour = () => {
        closeWelcome();
        if (window.showPage) window.showPage("studio");
        document.querySelector(".roadmap")?.scrollIntoView({ behavior: "smooth", block: "start" });
      };
      const claimBtn = document.getElementById("wclaimbtn");
      if (claimBtn) claimBtn.onclick = async function () {
        this.disabled = true;
        const { status, data } = await api("/api/claim-welcome", { method: "POST" });
        if (status === 200 && data && data.granted > 0) {
          this.textContent = "✓ Начислено — можно начинать";
          this.classList.add("done");
          document.getElementById("wskipclaimbtn").style.display = "none";
          document.getElementById("wtourbtn").style.display = "flex";
          setBalance((ME?.dashboard.credits || 0) + data.granted);
          haptic("success");
        } else {
          this.disabled = false;
          toast("Не удалось начислить — попробуйте ещё раз");
        }
      };
      const skipClaimBtn = document.getElementById("wskipclaimbtn");
      if (skipClaimBtn) skipClaimBtn.onclick = closeWelcome;
      const doneBtn = document.getElementById("wdonebtn");
      if (doneBtn) doneBtn.onclick = openStudioTour;
      document.getElementById("wtourbtn").onclick = openStudioTour;
    }

    // ————— global state —————
    let ME = null; // /api/me payload
    let BOT = "neuroshot_ai_bot";

    function setBalance(n) {
      if (!ME) return;
      ME.dashboard.credits = n;
      const pill = document.getElementById("pillN");
      if (pill) pill.textContent = n;
    }

    // ————— studio (create-in-app) —————
    const sheet = document.getElementById("sheet"), sheetBg = document.getElementById("sheetBg"), sheetBody = document.getElementById("sheetBody");
    const st = { tab: "shoot", pick: null, photo: null, photoUrl: null, retry: null };
    // Concurrent renders: every generation is an independent job with its own
    // poll loop — minimizing the sheet or starting another render never
    // interrupts the ones in flight, and each result stays bound to its job.
    const jobs = new Map(); // genId -> {id, isVideo, campaignId}
    let viewedJob = null; // job id currently displayed in the sheet (or null)
    function openSheet() { sheet.classList.add("on"); sheetBg.classList.add("on"); }
    // One-shot interceptor for the NEXT sheet close (paywall exit-offer). The
    // hook is cleared before it runs so a second close always really closes.
    let sheetCloseHook = null;
    function closeSheet() {
      if (sheetCloseHook) { const h = sheetCloseHook; sheetCloseHook = null; h(); return; }
      sheet.classList.remove("on"); sheetBg.classList.remove("on"); viewedJob = null;
    }
    sheetBg.onclick = closeSheet;
    document.getElementById("sheetX").onclick = closeSheet; // persistent exit for the viewer + every sub-view

    function updateJobsPill() {
      const p = document.getElementById("jobsPill");
      if (!p) return;
      p.style.display = jobs.size ? "" : "none";
      const n = document.getElementById("jobsN");
      if (n) n.textContent = jobs.size;
    }

    const TABS = [
      ["shoot", "📸 Фотосессия"], ["product", "🛍 Товар"], ["scenes", "🎉 Сценарии"], ["video", "🎬 Видео"], ["text", "✨ Из текста"],
    ];

    function studio(tab) {
      st.tab = tab || st.tab; st.pick = null; st.photo = null; st.photoUrl = null;
      // The video/text tabs ARE the Studio now — one composer, model picker inside.
      if (st.tab === "video") { openStudio({ mode: "video" }); return; }
      if (st.tab === "text") { openStudio({ mode: "image", origin: "text" }); return; }
      openSheet(); viewPick();
    }

    function tabsHtml() {
      return `<div class="tabs">${TABS.map(([id, l]) =>
        `<button class="tab ${id === st.tab ? "on" : ""}" data-tab="${id}">${l}</button>`).join("")}</div>`;
    }
    function bindTabs() {
      sheetBody.querySelectorAll("[data-tab]").forEach((b) => (b.onclick = () => {
        st.tab = b.dataset.tab; st.pick = null;
        if (st.tab === "video") { openStudio({ mode: "video" }); return; }
        if (st.tab === "text") { openStudio({ mode: "image", origin: "text" }); return; }
        viewPick();
      }));
    }

    function viewPick() {
      const c = ME.catalog;
      let inner = "";
      // viewPick is now the GALLERY surface only (presets + scenarios) — the
      // video/text tabs route straight into the Studio composer (see bindTabs).
      if (st.tab === "video" || st.tab === "text") st.tab = "shoot";
      if (st.tab === "shoot" || st.tab === "product") {
        // Style Gallery: marketplace-style cards (preview photo, price, real
        // usage/trending) — see docs/prompt-library.md. Trending (a genuine
        // top-tap signal from the server, never fabricated) sorts first so the
        // most-picked looks lead; ties keep the catalog's declared order.
        const cat = st.tab === "shoot" ? "photo" : "product";
        const list = c.presets.filter((p) => p.category === cat)
          .map((p, i) => ({ p, i }))
          .sort((a, b) => (b.p.trending - a.p.trending) || (a.i - b.i))
          .map(({ p }) => p);
        inner = `<div class="pcards">${list.map((p) => `
          <button class="pcard" data-preset="${p.id}">
            <img class="pbg" src="${esc(p.previewUrl)}" alt="" loading="lazy" />
            <div class="ptop">
              <span class="pemoji">${esc(p.label.split(" ")[0] || "✨")}</span>
              ${p.trending ? `<span class="ptrend">🔥 Тренд</span>` : ""}
            </div>
            <b>${esc(p.label)}</b>
            <div class="prow">
              <span class="price">${p.credits} ${PATRON}</span>
              ${p.usageCount > 0 ? `<span class="pcount">${p.usageCount}×</span>` : ""}
            </div>
          </button>`).join("")}</div>`;
      } else if (st.tab === "scenes") {
        inner = `<div class="choices">${c.campaigns.map((k) =>
          `<button class="choice" data-camp="${k.id}"><b>${esc(k.label)}</b><span class="desc">+ видео за ${k.videoCredits} ${PATRON}</span><span class="price">${k.imageCredits} ${PATRON}</span></button>`).join("")}</div>`;
      }
      sheetBody.innerHTML = `<h3>Студия</h3>${tabsHtml()}${inner}`;
      bindTabs();
      // Graceful degradation for a preset that ships before its preview art
      // does (see docs/prompt-library.md) — falls back to the emoji tile
      // instead of a broken image.
      sheetBody.querySelectorAll(".pcard .pbg").forEach((img) => (img.onerror = () => img.closest(".pcard").classList.add("noart")));

      sheetBody.querySelectorAll("[data-preset]").forEach((b) => (b.onclick = () => {
        const p = c.presets.find((x) => x.id === b.dataset.preset);
        // Preset tap → the Studio, prefilled. A ⇄-swap re-entry keeps the photo (E7).
        const keep = !!(stu && stu.swap);
        if (stu) stu.swap = false;
        openStudio({ preset: p, origin: "preset", modelKey: p.model, keep });
      }));
      sheetBody.querySelectorAll("[data-camp]").forEach((b) => (b.onclick = () => viewCampaign(b.dataset.camp)));
    }

    function viewCampaign(id) {
      const k = ME.catalog.campaigns.find((x) => x.id === id);
      sheetBody.innerHTML = `
        <h3>${esc(k.label)}</h3>
        <div class="sub">${esc(k.ask)}</div>
        <div class="choices">${k.presets.map((p) =>
          `<button class="choice" data-cp="${p.id}"><b>${esc(p.label)}</b><span class="price">${k.imageCredits} ${PATRON}</span></button>`).join("")}</div>
        <div class="row"><button class="btn ghost" id="backBtn">← Назад</button></div>`;
      sheetBody.querySelector("#backBtn").onclick = () => viewPick();
      sheetBody.querySelectorAll("[data-cp]").forEach((b) => (b.onclick = () => {
        st.pick = { source: "campaign", id: id + ":" + b.dataset.cp, campaignId: id, credits: k.imageCredits, needPhoto: true, options: [], custom: "" };
        if ((k.quiz || []).length) viewQuiz(k); else viewPhoto();
      }));
    }

    /** Story builder: one quick pick per step + a short free-words field. */
    function viewQuiz(k) {
      const sel = {}; // stepId -> optionId
      sheetBody.innerHTML = `
        <h3>Соберите свою историю</h3>
        <div class="sub">Пара быстрых выборов — и сцена станет вашей. Всё необязательно.</div>
        ${k.quiz.map((s) => `
          <div class="quiz-q">${esc(s.question)}</div>
          <div class="chips" data-step="${s.id}">${s.options.map((o) =>
            `<button class="chip" data-opt="${o.id}">${esc(o.label)}</button>`).join("")}</div>`).join("")}
        <div class="quiz-q">Пара слов от себя (необязательно)</div>
        <input class="words" id="qWords" maxlength="200" placeholder="например: с золотой короной и снегом" />
        <div class="stack">
          <button class="btn primary" id="qNext">Дальше →</button>
          <button class="btn ghost" id="backBtn">← Назад</button>
        </div>`;
      sheetBody.querySelectorAll(".chips").forEach((row) => {
        row.querySelectorAll(".chip").forEach((chip) => (chip.onclick = () => {
          const on = chip.classList.contains("on");
          row.querySelectorAll(".chip").forEach((c) => c.classList.remove("on"));
          if (!on) { chip.classList.add("on"); sel[row.dataset.step] = chip.dataset.opt; }
          else delete sel[row.dataset.step]; // tap again to unselect
        }));
      });
      sheetBody.querySelector("#backBtn").onclick = () => viewCampaign(k.id);
      sheetBody.querySelector("#qNext").onclick = () => {
        st.pick.options = Object.values(sel);
        st.pick.custom = sheetBody.querySelector("#qWords").value.trim();
        viewPhoto();
      };
    }

    /** The caller's previous image results — reusable as a source, no re-upload. */
    function myImages() {
      return (ME.generations || []).filter((g) => g.status === "ok" && g.output_url && !/\.(mp4|webm|mov)(\?|$)/i.test(g.output_url));
    }

    function viewPhoto() {
      st.photo = null; st.photoUrl = null; st.pick.generation_id = null;
      const works = myImages().slice(0, 10);
      sheetBody.innerHTML = `
        <h3>Ваше фото</h3>
        <div id="photoZone">
          <label class="drop"><input type="file" accept="image/*" id="file" />
            <span class="em">📸</span><b>Выбрать фото</b><span>снимите или выберите из галереи</span>
          </label>
          ${works.length ? `<div class="quiz-q">…или из моих работ</div>
          <div class="mini" id="mini">${works.map((g) =>
            `<img src="${esc(g.output_url)}" data-gid="${g.id}" loading="lazy" alt="" />`).join("")}</div>` : ""}
        </div>
        ${(st.pick.source === "preset" || st.pick.source === "campaign") && (ME.catalog.presetAspects || []).length > 1 ? `
        <div class="quiz-q">Формат кадра</div>
        <div class="chips" id="arRow">${ME.catalog.presetAspects.map((r) =>
          `<button class="chip ${r === (st.pick.aspect_ratio || "auto") ? "on" : ""}" data-ar="${r}">${esc(RATIO_LABEL[r] || r)}</button>`).join("")}</div>` : ""}
        <div class="stack">
          <button class="btn primary" id="goBtn" disabled>Создать за ${st.pick.credits} ${PATRON}</button>
          <button class="btn ghost" id="backBtn">← Назад</button>
        </div>`;
      sheetBody.querySelectorAll("#arRow .chip").forEach((c) => (c.onclick = () => {
        sheetBody.querySelectorAll("#arRow .chip").forEach((x) => x.classList.remove("on"));
        c.classList.add("on"); st.pick.aspect_ratio = c.dataset.ar;
      }));
      sheetBody.querySelector("#backBtn").onclick = () => viewPick();
      const goBtn = sheetBody.querySelector("#goBtn");
      sheetBody.querySelector("#file").onchange = async (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const data = await downscale(f);
        if (!data) { toast("Не получилось прочитать фото"); return; }
        st.photo = data; st.photoUrl = null; st.pick.generation_id = null;
        sheetBody.querySelector("#photoZone").innerHTML = `
          <div class="photo-preview"><img src="${data}" alt="" /><button class="redo" id="redo">↺ Другое</button></div>`;
        sheetBody.querySelector("#redo").onclick = () => viewPhoto();
        goBtn.disabled = false;
      };
      sheetBody.querySelectorAll("#mini img").forEach((im) => (im.onclick = () => {
        sheetBody.querySelectorAll("#mini img").forEach((x) => x.classList.remove("on"));
        im.classList.add("on");
        st.photo = null; st.photoUrl = null;
        st.pick.generation_id = Number(im.dataset.gid); // server resolves the URL, owner-scoped
        goBtn.disabled = false;
      }));
      goBtn.onclick = () => run();
    }

    /** Downscale to ≤1600px JPEG so uploads stay light on mobile networks. */
    function downscale(file) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const max = 1600, k = Math.min(1, max / Math.max(img.width, img.height));
          const cv = document.createElement("canvas");
          cv.width = Math.round(img.width * k); cv.height = Math.round(img.height * k);
          cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
          URL.revokeObjectURL(url);
          resolve(cv.toDataURL("image/jpeg", 0.9));
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
        img.src = url;
      });
    }

    async function ensureUploaded() {
      if (st.photoUrl || !st.photo) return st.photoUrl;
      const url = await uploadData(st.photo);
      if (!url) { toast("Не удалось загрузить фото — попробуйте ещё раз"); return null; }
      return (st.photoUrl = url);
    }

    /** Upload a downscaled data-URL to fal storage; returns the HTTPS url or null. */
    async function uploadData(dataUrl) {
      const { status, data } = await api("/api/upload", { method: "POST", body: JSON.stringify({ data: dataUrl }) });
      return status === 200 ? data.url : null;
    }

    async function run(payloadOverride) {
      const pick = st.pick;
      const isVideo = pick.source === "campaign_video" || (pick.source === "model" && ME.catalog.videoModels.some((m) => m.key === pick.model));
      viewProgress(isVideo);

      let image_url;
      if (pick.needPhoto && !pick.generation_id) {
        image_url = await ensureUploaded();
        if (!image_url) { viewPhoto(); return; }
      }
      // Optional video end frame: upload the chosen file (a picked own-work goes by id).
      let end_image_url;
      if (!payloadOverride && pick.end_photo && !pick.end_generation_id) {
        end_image_url = await uploadData(pick.end_photo);
        if (!end_image_url) { toast("Не удалось загрузить финальный кадр"); viewPick(); return; }
      }

      const body = payloadOverride || {
        source: pick.source, id: pick.id, model: pick.model,
        prompt: pick.prompt, image_url,
        generation_id: pick.generation_id || undefined,
        options: pick.options && pick.options.length ? pick.options : undefined,
        custom: pick.custom || undefined,
        duration: pick.duration || undefined,
        aspect_ratio: pick.aspect_ratio && pick.aspect_ratio !== "auto" ? pick.aspect_ratio : undefined,
        resolution: pick.resolution || undefined,
        end_image_url,
        end_generation_id: pick.end_generation_id || undefined,
        scene: pick.scene || undefined,
      };
      st.retry = { body, campaignId: pick.campaignId || null };
      const { status, data } = await api("/api/generate", { method: "POST", body: JSON.stringify(body) });
      if (status === 402) { viewPaywall(data); return; }
      if (status !== 200) { toast("Что-то пошло не так — попробуйте ещё раз"); viewPick(); return; }
      setBalance(data.balance);
      startJob(data.id, isVideo, pick.campaignId || null);
    }

    /** Register an independent render job and show its progress in the sheet. */
    function startJob(id, isVideo, campaignId) {
      const job = { id, isVideo, campaignId, started: Date.now() };
      jobs.set(id, job); updateJobsPill();
      viewedJob = id; viewProgress(isVideo, id);
      pollJob(job);
      renderGallery(1); // pending ripple card appears in «Мои работы» immediately
    }

    /**
     * Reload-safe in-progress renders (docs/cinema-studio-spec.md §4.1): the
     * jobs map dies with the page, but the DB doesn't — /api/me ships the last
     * 30 generations including status:'pending'. Re-register a silent poll job
     * for each so the jobs pill + the gallery's ripple cards come back exactly
     * as if the reload never happened. No sheet is opened (silent resume);
     * completion lands via the normal pollJob path (toast + gallery refresh),
     * a failure shows the refunded toast. The 6-min client window restarts —
     * the server reaper still guarantees a terminal state for true zombies.
     */
    function resumePending() {
      let added = 0;
      for (const g of ME.generations || []) {
        if (g.status === "pending" && !jobs.has(g.id)) {
          const isVideo = (ME.catalog.videoModels || []).some((m) => m.key === g.model) || /^dub_/.test(g.model || "");
          const job = { id: g.id, isVideo, campaignId: null, started: Date.now(), resumed: true };
          jobs.set(g.id, job);
          pollJob(job);
          added++;
        }
      }
      updateJobsPill();
      return added;
    }

    function viewProgress(isVideo, jobId) {
      openSheet();
      sheetBody.innerHTML = `
        <div class="progress">
          <div class="orb"></div>
          <h4>${isVideo ? "Рендерим видео…" : "Генерируем…"}</h4>
          <p>${isVideo ? "Обычно 1–3 минуты." : "Обычно 10–30 секунд ✨"}</p>
        </div>
        <div class="stack">
          <button class="btn ghost" id="hideBtn">⬇ Свернуть — рендер продолжится в фоне</button>
        </div>`;
      sheetBody.querySelector("#hideBtn").onclick = () => closeSheet();
      if (jobId) viewedJob = jobId;
    }

    /** Each job polls on its own timer — jobs never block each other. */
    function pollJob(job) {
      setTimeout(async () => {
        if (!jobs.has(job.id)) return; // already finished elsewhere
        const { status, data } = await api("/api/generations/" + job.id);
        if (status === 200 && data.status === "ok") {
          jobs.delete(job.id); updateJobsPill(); refreshMe(); renderGallery(1); haptic("success");
          if (viewedJob === job.id && sheet.classList.contains("on")) viewResult(data, job);
          else toast("✨ Готово! Работа уже в «Мои работы»");
          return;
        }
        if (status === 200 && data.status === "error") {
          jobs.delete(job.id); updateJobsPill(); refreshMe(); renderGallery(1); haptic("error");
          toast(`Не получилось — ${PATRON} патроны возвращены`);
          if (viewedJob === job.id && sheet.classList.contains("on")) viewPick();
          return;
        }
        if (Date.now() - job.started > 6 * 60 * 1000) {
          jobs.delete(job.id); updateJobsPill(); renderGallery(1);
          toast("Долгий рендер — результат появится в «Мои работы»");
          if (viewedJob === job.id && sheet.classList.contains("on")) closeSheet();
          return;
        }
        pollJob(job);
      }, 2500);
    }

    function viewResult(g, job) {
      const isVideo = /\.(mp4|webm|mov)(\?|$)/i.test(g.output_url || "");
      const camp = job?.campaignId ? ME.catalog.campaigns.find((x) => x.id === job.campaignId) : null;
      const upsell = camp && !isVideo
        ? `<button class="btn primary" id="animBtn">${esc(camp.animateLabel)} · ${camp.videoCredits} ${PATRON}</button>`
        : !isVideo
          ? `<button class="btn primary" id="animBtn2">🎬 Оживить в видео · ${ME.catalog.videoModels[0].credits} ${PATRON}</button>`
          : "";
      sheetBody.innerHTML = `
        <h3>Готово ✨</h3>
        <div class="result-media">${isVideo
          ? `<video src="${esc(g.output_url)}" controls autoplay muted loop playsinline></video>`
          : `<img src="${esc(g.output_url)}" alt="" />`}</div>
        <div class="stack">
          ${upsell}
          <div class="row" style="margin-top:0">
            <button class="btn ghost" id="saveBtn">📥 Скачать</button>
            <button class="btn ghost" id="chatBtn">💬 В чат</button>
          </div>
          <div class="row" style="margin-top:0">
            <a class="btn ghost" href="${esc(g.output_url)}" target="_blank" rel="noopener noreferrer">↗ Открыть</a>
            <button class="btn ghost" id="moreBtn">➕ Ещё</button>
          </div>
        </div>`;
      // Upsells reference the generation by ID — the server resolves the file,
      // so chains survive app restarts and never depend on client state.
      const animBtn = sheetBody.querySelector("#animBtn");
      if (animBtn) animBtn.onclick = () => {
        const m = ME.catalog.videoModels.find((x) => x.key === camp.videoModelKey) || ME.catalog.videoModels[0];
        st.pick = { source: "campaign_video", id: camp.id, campaignId: camp.id, credits: camp.videoCredits, needPhoto: false, generation_id: g.id, options: [], custom: "" };
        viewVideoComposer(m);
      };
      const animBtn2 = sheetBody.querySelector("#animBtn2");
      if (animBtn2) animBtn2.onclick = () => openStudio({ mode: "video", generationId: g.id, srcPreview: g.output_url });
      sheetBody.querySelector("#saveBtn").onclick = () => saveMedia(g.output_url, g.id);
      sheetBody.querySelector("#chatBtn").onclick = () => sendToChat(g.id);
      sheetBody.querySelector("#moreBtn").onclick = () => { st.pick = null; viewPick(); };
    }

    /** Save to the device: Telegram's native downloadFile when available. */
    function saveMedia(url, id) {
      const isVideo = /\.(mp4|webm|mov)(\?|$)/i.test(url);
