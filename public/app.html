      const name = `neuroshot-${id}${isVideo ? ".mp4" : ".jpg"}`;
      if (tg?.downloadFile) {
        try { tg.downloadFile({ url, file_name: name }, () => {}); return; } catch (e) { /* fall through */ }
      }
      const a = document.createElement("a");
      a.href = url; a.download = name; a.target = "_blank"; a.rel = "noopener";
      document.body.appendChild(a); a.click(); a.remove();
    }

    /** Deliver the file into the user's Telegram chat with the bot. */
    async function sendToChat(id) {
      const { status } = await api("/api/send", { method: "POST", body: JSON.stringify({ id }) });
      if (status === 200) { haptic("success"); toast("Отправлено в чат с ботом 💬"); }
      else toast("Не удалось отправить — попробуйте позже");

    /** Gallery item viewer: save / send to chat / cross-sale into video. */
    function openViewer(item) {
      openSheet(); viewedJob = null;
      const isVideo = /\.(mp4|webm|mov)(\?|$)/i.test(item.output_url || "");
      sheetBody.innerHTML = `
        <h3>Моя работа</h3>

        <div class="stack">
          ${!isVideo ? `<button class="btn primary" id="vAnim">🎬 Оживить в видео · от ${ME.catalog.videoModels.reduce((a, m) => Math.min(a, m.credits), 1e9)} ${PATRON}</button>` : ""}
          <div class="row" style="margin-top:0">

            <button class="btn ghost" id="vMore">✨ Создать ещё</button>

      const vAnim = sheetBody.querySelector("#vAnim");
      if (vAnim) vAnim.onclick = () => viewAnimateFrom(item);
      sheetBody.querySelector("#vSave").onclick = () => saveMedia(item.output_url, item.id);
      sheetBody.querySelector("#vChat").onclick = () => sendToChat(item.id);
      sheetBody.querySelector("#vMore").onclick = () => { st.pick = null; viewPick(); };

    /** Animate a previous work: straight into the Studio, video mode, source = gen id. */
    function viewAnimateFrom(item) {
      openStudio({ mode: "video", generationId: item.id, srcPreview: item.output_url });
    }

    const RATIO_LABEL = { auto: "Как фото", "9:16": "9:16 ↕", "16:9": "16:9 ↔", "1:1": "1:1 ◻", "4:3": "4:3 ▭", "3:4": "3:4 ▯" };

    // ————————————————————————————————————————————————————————————————————
    // Cinema Studio — the ONE generation page (docs/cinema-studio-spec.md §4).
    // Every entry lands here PREFILLED: ① prompt block (preset chip w/
    // personalization, or free text) → ③ inputs (device / my works) → ④ mode
    // chip 🖼/🎬 → ⑤ the FULL model registry with patron prices → ⑥ params only
    // the selected model declares → ⑦ live patron total. Server stays the
    // pricing authority (402 paywall); this mirrors priceFor exactly.
    // ————————————————————————————————————————————————————————————————————
    let stu = null;
    function openStudio(ctx) {
      ctx = ctx || {};
      const prev = ctx.keep && stu ? stu : null; // ⇄ preset swap keeps inputs (E7)
      stu = {
        origin: ctx.origin || (ctx.preset ? "preset" : "model"),
        preset: ctx.preset || null,
        custom: prev ? prev.custom : "",
        prompt: prev ? prev.prompt : "",
        options: {}, // video story picks: stepId -> optionId
        mode: ctx.mode || (prev ? prev.mode : "image"),
        modelKey: ctx.modelKey || null,
        photo: prev ? prev.photo : null,
        photoUrl: prev ? prev.photoUrl : null,
        generationId: ctx.generationId || (prev ? prev.generationId : null),
        srcPreview: ctx.srcPreview || (prev ? prev.srcPreview : null),
        endPhoto: null, endGenerationId: null,
        duration: undefined, aspect: undefined, resolution: undefined,
        showAll: false, editOpen: prev ? prev.editOpen : false, swap: false,
      };
      if (!stu.modelKey) stu.modelKey = defaultStudioModel();
      clampStudioOpts();
      openSheet(); viewStudio();
    }
    function studioList() { return (ME.catalog.studio && ME.catalog.studio[stu.mode]) || []; }
    function studioModel() { return studioList().find((m) => m.key === stu.modelKey) || studioList()[0]; }
    function stuHasSource() { return !!(stu.photo || stu.generationId); }
    function defaultStudioModel() {
      const list = studioList();
      if (!list.length) return null;
      if (stu.mode === "image") {
        const pref = stuHasSource() ? list.filter((m) => m.needsImage) : list.filter((m) => !m.needsImage);
        return (pref[0] || list[0]).key;
      }
      return list[0].key; // video: cheapest first
    }
    /** Clamp opts to the selected model's declared capabilities (E6). */
    function clampStudioOpts() {
      const m = studioModel();
      if (!m) return;
      stu.modelKey = m.key;
      const caps = stu.mode === "video" ? m.video : m.image;
      if (stu.aspect && !((caps && caps.aspectRatios) || []).includes(stu.aspect)) stu.aspect = undefined;
      if (stu.resolution && !((caps && caps.resolutions) || []).some((r) => r.id === stu.resolution)) stu.resolution = undefined;
      if (stu.mode === "video" && m.video) {
        if (!m.video.durations.some((d) => d.seconds === stu.duration)) stu.duration = m.video.durations[0].seconds;
        if (!m.video.endFrame) { stu.endPhoto = null; stu.endGenerationId = null; }
      } else { stu.duration = undefined; stu.endPhoto = null; stu.endGenerationId = null; }
    }
    /** Live patron total — exact client mirror of the server's priceFor. */
    function studioPrice() {
      const m = studioModel();
      if (!m) return 0;
      let credits = m.credits;
      if (stu.mode === "video" && m.video) {
        const d = m.video.durations.find((x) => x.seconds === stu.duration);
        if (d) credits = d.credits;
        const t = stu.resolution ? (m.video.resolutions || []).find((r) => r.id === stu.resolution) : null;
        if (t && t.mult !== 1) credits = Math.ceil(credits * t.mult);
      } else if (m.image) {
        const t = stu.resolution ? (m.image.resolutions || []).find((r) => r.id === stu.resolution) : null;
        if (t) credits = t.credits;
      }
      return credits;
    }

    function viewStudio() {
      const m = studioModel();
      if (!m) { st.tab = "shoot"; viewPick(); return; }
      const isVideo = stu.mode === "video";
      const caps = isVideo ? m.video : m.image;
      const list = studioList();
      const has = stuHasSource();
      // D6-A: compatible models lead; the rest stay reachable under «показать все».
      // The SELECTED model is always visible even before its photo arrives —
      // a preset's default edit-engine must never be hidden by the split.
      let primary = list, hidden = [];
      if (!isVideo && !has) {
        primary = list.filter((x) => !x.needsImage || x.key === stu.modelKey);
        hidden = list.filter((x) => x.needsImage && x.key !== stu.modelKey);
      }
      const works = myImages().slice(0, 8);
      const srcUrl = stu.srcPreview || (stu.generationId ? ((myImages().find((g) => g.id === stu.generationId) || {}).output_url || "") : "");
      const story = isVideo ? (ME.catalog.videoStory || []) : [];
      const modelRow = (x) => `

          <span><b>${esc(x.label)}</b>
            ${!isVideo && has && !x.needsImage ? `<div class="mnote">создаст с нуля — фото не использует</div>` : ""}
            ${!isVideo && !has && x.needsImage ? `<div class="mnote">нужно фото</div>` : ""}
            ${stu.preset && x.key === stu.preset.model ? `<div class="mnote">рекомендовано для этого стиля</div>` : ""}
          </span>
          <span class="price">${isVideo ? "от " : ""}${x.credits} ${PATRON}</span>
        </button>`;

      sheetBody.innerHTML = `
        <h3>Студия</h3>
        ${stu.preset && !isVideo ? `
          <div class="stublock"><div class="stuchip">
            <span>${esc(stu.preset.label)}</span>
            <button class="chip ${stu.editOpen ? "on" : ""}" id="stuEdit">✎ Изменить</button>
            <button class="chip" id="stuSwap">⇄ Сменить стиль</button>
          </div>
          ${stu.editOpen ? `<input class="words" id="stuCustom" maxlength="200" placeholder="допишите детали: имя, цвет, настроение…" value="${esc(stu.custom)}" style="margin-top:8px" />` : ""}</div>` : ""}
        ${stu.preset && isVideo ? `<div class="sub">Стиль применяется к фото. Для видео опишите движение ниже.</div>` : ""}
        ${!stu.preset || isVideo ? `
          <div class="quiz-q">${isVideo ? "Движение (необязательно)" : "Что нарисовать?"}</div>
          <textarea class="prompt" id="stuPrompt" placeholder="${isVideo ? "камера медленно приближается, ветер в волосах…" : "флакон духов на мокром чёрном мраморе…"}">${esc(stu.prompt)}</textarea>` : ""}
        <div class="quiz-q">Фото ${!isVideo && !m.needsImage ? "(не используется этой моделью)" : ""}</div>
        <div id="stuPhotoZone">
          ${stu.photo ? `<div class="photo-preview"><img src="${stu.photo}" alt="" /><button class="redo" id="stuRedo">↺ Другое</button></div>`
            : stu.generationId ? `<div class="photo-preview"><img src="${esc(srcUrl)}" alt="" /><button class="redo" id="stuRedo">↺ Другое</button></div>`
            : `<label class="drop"><input type="file" accept="image/*" id="stuFile" />
                 <span class="em">📸</span><b>Выбрать фото</b><span>с устройства или из галереи</span></label>
               ${works.length ? `<div class="quiz-q">…или из моих работ</div>
               <div class="mini" id="stuMini">${works.map((g) => `<img src="${esc(g.output_url)}" data-gid="${g.id}" loading="lazy" alt="" />`).join("")}</div>` : ""}`}
        </div>
        <div class="seg" id="stuSeg">
          <button data-md="image" class="${!isVideo ? "on" : ""}">🖼 Фото</button>
          <button data-md="video" class="${isVideo ? "on" : ""}">🎬 Видео</button>
        </div>
        ${isVideo && !has ? `<div class="sub">Для видео нужно исходное фото — добавьте его выше или сначала создайте картинку.</div>` : ""}
        <div class="quiz-q">Модель</div>
        <div class="mlist">
          ${primary.map(modelRow).join("")}
          ${hidden.length && !stu.showAll ? `<button class="btn ghost" id="stuMore">Показать все модели (${hidden.length}) — нужно фото</button>` : ""}
          ${hidden.length && stu.showAll ? hidden.map(modelRow).join("") : ""}
        </div>
        ${caps && caps.aspectRatios && caps.aspectRatios.length > 1 ? `
          <div class="quiz-q">Формат кадра</div>
          <div class="chips" id="stuAr">${caps.aspectRatios.map((r) =>
            `<button class="chip ${r === (stu.aspect || caps.aspectRatios[0]) ? "on" : ""}" data-ar="${r}">${esc(RATIO_LABEL[r] || r)}</button>`).join("")}</div>` : ""}
        ${caps && caps.resolutions && caps.resolutions.length ? `
          <div class="quiz-q">Качество</div>
          <div class="chips" id="stuRes">${caps.resolutions.map((r) =>
            `<button class="chip ${r.id === (stu.resolution || caps.resolutions[0].id) ? "on" : ""}" data-res="${r.id}">${esc(r.label)} · ${r.credits} ${PATRON}</button>`).join("")}</div>` : ""}
        ${isVideo && m.video ? `
          <div class="quiz-q">Длительность</div>
          <div class="chips" id="stuDur">${m.video.durations.map((d) =>
            `<button class="chip ${d.seconds === stu.duration ? "on" : ""}" data-dur="${d.seconds}">${d.seconds} сек · ${d.credits} ${PATRON}</button>`).join("")}</div>` : ""}
        ${isVideo && m.video && m.video.endFrame ? `
          <div class="quiz-q">Финальный кадр (необязательно)</div>
          <div id="stuEndZone">${stu.endPhoto ? `<div class="photo-preview"><img src="${stu.endPhoto}" alt="" /><button class="redo" id="stuEndRedo">✕ Убрать</button></div>`
            : `<label class="drop"><input type="file" accept="image/*" id="stuEndFile" />
                 <span class="em">🏁</span><b>Кадр-финал</b><span>видео плавно придёт к нему</span></label>`}</div>` : ""}
        ${story.length ? `${story.map((s) => `
          <div class="quiz-q">${esc(s.question)}</div>
          <div class="chips" data-story="${s.id}">${s.options.map((o) =>
            `<button class="chip ${stu.options[s.id] === o.id ? "on" : ""}" data-opt="${o.id}">${esc(o.label)}</button>`).join("")}</div>`).join("")}` : ""}
        <div class="stack">
          <button class="btn primary" id="stuGo"></button>
          <button class="btn ghost" id="stuBack">← Галерея стилей</button>
        </div>`;

      const goBtn = sheetBody.querySelector("#stuGo");
      const cta = () => {
        const p = studioPrice();
        if ((isVideo || m.needsImage) && !stuHasSource()) { goBtn.textContent = "Добавьте фото ↑"; goBtn.disabled = true; return; }
        if (!isVideo && !stu.preset && !(stu.prompt || "").trim()) { goBtn.textContent = "Опишите, что нарисовать ↑"; goBtn.disabled = true; return; }
        goBtn.disabled = false;
        goBtn.textContent = p > ME.dashboard.credits ? `Пополнить · нужно ${p} ${PATRON}` : `Создать за ${p} ${PATRON}`;
      };
      cta();
      const bind = (sel, fn) => { const el = sheetBody.querySelector(sel); if (el) fn(el); };
      bind("#stuBack", (el) => (el.onclick = () => { st.tab = stu.preset && stu.preset.category === "product" ? "product" : "shoot"; viewPick(); }));
      bind("#stuEdit", (el) => (el.onclick = () => { stu.editOpen = !stu.editOpen; viewStudio(); }));
      bind("#stuSwap", (el) => (el.onclick = () => { stu.swap = true; st.tab = stu.preset.category === "product" ? "product" : "shoot"; viewPick(); }));
      bind("#stuCustom", (el) => (el.oninput = () => { stu.custom = el.value; }));
      bind("#stuPrompt", (el) => (el.oninput = () => { stu.prompt = el.value; cta(); }));
      sheetBody.querySelectorAll("#stuSeg button").forEach((b) => (b.onclick = () => {
        if (b.dataset.md === stu.mode) return;
        stu.mode = b.dataset.md; stu.modelKey = defaultStudioModel();
        stu.aspect = undefined; stu.resolution = undefined; stu.duration = undefined; stu.showAll = false;
        clampStudioOpts(); viewStudio();
      }));
      sheetBody.querySelectorAll("[data-mk]").forEach((b) => (b.onclick = () => { stu.modelKey = b.dataset.mk; clampStudioOpts(); viewStudio(); }));
      bind("#stuMore", (el) => (el.onclick = () => { stu.showAll = true; viewStudio(); }));
      sheetBody.querySelectorAll("#stuAr .chip").forEach((c) => (c.onclick = () => { stu.aspect = c.dataset.ar; viewStudio(); }));
      sheetBody.querySelectorAll("#stuRes .chip").forEach((c) => (c.onclick = () => { stu.resolution = c.dataset.res; viewStudio(); }));
      sheetBody.querySelectorAll("#stuDur .chip").forEach((c) => (c.onclick = () => { stu.duration = Number(c.dataset.dur); viewStudio(); }));
      sheetBody.querySelectorAll("[data-story]").forEach((row) => {
        row.querySelectorAll(".chip").forEach((chip) => (chip.onclick = () => {
          const id = row.dataset.story;
          if (stu.options[id] === chip.dataset.opt) delete stu.options[id];
          else stu.options[id] = chip.dataset.opt;
          viewStudio();
        }));
      });
      bind("#stuFile", (el) => (el.onchange = async (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const data = await downscale(f);
        if (!data) { toast("Не получилось прочитать фото"); return; }
        stu.photo = data; stu.photoUrl = null; stu.generationId = null; stu.srcPreview = null;
        clampStudioOpts(); viewStudio();
      }));
      sheetBody.querySelectorAll("#stuMini img").forEach((im) => (im.onclick = () => {
        stu.photo = null; stu.photoUrl = null;
        stu.generationId = Number(im.dataset.gid); stu.srcPreview = im.getAttribute("src");
        clampStudioOpts(); viewStudio();
      }));
      bind("#stuRedo", (el) => (el.onclick = () => { stu.photo = null; stu.photoUrl = null; stu.generationId = null; stu.srcPreview = null; viewStudio(); }));
      bind("#stuEndFile", (el) => (el.onchange = async (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const data = await downscale(f);
        if (data) { stu.endPhoto = data; viewStudio(); }
      }));
      bind("#stuEndRedo", (el) => (el.onclick = () => { stu.endPhoto = null; stu.endGenerationId = null; viewStudio(); }));
      goBtn.onclick = () => {
        const p = studioPrice();
        // E1: never fire a doomed request — the CTA itself becomes the top-up path.
        if (p > ME.dashboard.credits) { viewPaywall({ need: p, balance: ME.dashboard.credits, packs: ME.packs }); return; }
        runStudio();
      };
    }

    /** Submit the composer: upload sources → one /api/generate → poll job. */
    async function runStudio() {
      const m = studioModel();
      const isVideo = stu.mode === "video";
      viewProgress(isVideo);
      if (stu.photo && !stu.photoUrl) {
        stu.photoUrl = await uploadData(stu.photo);
        if (!stu.photoUrl) { toast("Не удалось загрузить фото — попробуйте ещё раз"); viewStudio(); return; }
      }
      let end_image_url;
      if (stu.endPhoto) {
        end_image_url = await uploadData(stu.endPhoto);
        if (!end_image_url) { toast("Не удалось загрузить финальный кадр"); viewStudio(); return; }
      }
      const opts = {
        image_url: stu.photoUrl || undefined,
        generation_id: stu.generationId || undefined,
        aspect_ratio: stu.aspect && stu.aspect !== "auto" ? stu.aspect : undefined,
        resolution: stu.resolution || undefined,
      };
      const body = stu.preset && !isVideo
        ? { source: "preset", id: stu.preset.id,
            // Only send a model when the user actually SWAPPED off the preset default.
            model: stu.modelKey !== stu.preset.model ? stu.modelKey : undefined,
            custom: (stu.custom || "").trim() || undefined, ...opts }
        : { source: "model", model: stu.modelKey, prompt: stu.prompt || "",
            options: Object.values(stu.options).length ? Object.values(stu.options) : undefined,
            custom: isVideo ? (stu.custom || "").trim() || undefined : undefined,
            duration: stu.duration || undefined,
            end_image_url, end_generation_id: stu.endGenerationId || undefined, ...opts };
      const { status, data } = await api("/api/generate", { method: "POST", body: JSON.stringify(body) });
      if (status === 402) { viewPaywall(data); return; }
      if (status !== 200) { toast("Что-то пошло не так — попробуйте ещё раз"); viewStudio(); return; }
      ME.dashboard.credits = data.balance;
      setBalance(data.balance);
      startJob(data.id, isVideo, null);
    }

    /**
     * Video composer: aspect ratio + duration (live price) + story quiz
     * (action / genre / emotion / camera) + personalization (hobby, pet, loved
     * things) + optional motion text. Server composes fragments onto the prompt.
     */
    function viewVideoComposer(m) {
      const pick = st.pick;
      const durs = m.video ? m.video.durations : [{ seconds: 5, credits: m.credits }];
      const ratios = m.video ? m.video.aspectRatios : ["auto"];
      const resList = (m.video && m.video.resolutions) || []; // quality ladder (Seedance)
      const hasEnd = !!(m.video && m.video.endFrame); // Kling 3.0 / Seedance: end frame
      const isCurated = pick.source === "campaign_video"; // motion prompt is curated
      const camp = pick.campaignId ? ME.catalog.campaigns.find((x) => x.id === pick.campaignId) : null;
      const scenes = (isCurated && camp && camp.videoScenes) || [];
      // Campaigns: on-theme scene chips replace the generic story quiz.
      const story = isCurated ? [] : (ME.catalog.videoStory || []);
      pick.model = m.key; // always send the (possibly swapped) model
      pick.aspect_ratio = pick.aspect_ratio || ratios[0];
      if (!durs.some((d) => d.seconds === pick.duration)) pick.duration = durs[0].seconds;
      if (resList.length && !resList.some((r) => r.id === pick.resolution)) pick.resolution = resList[0].id;
      if (!resList.length) pick.resolution = undefined;
      if (!hasEnd) { pick.end_photo = null; pick.end_generation_id = null; } // drop a stale end frame on models without it
      pick.options = pick.options || [];
      // Live price = ceil(duration price × the tier's exact multiplier) — mirrors
      // the server's priceFor precisely (using the raw mult, not rounded credits,
      // so the chip price always equals the amount actually charged).
      const resMult = () => {
        if (!pick.resolution || !resList.length) return 1;
        return (resList.find((r) => r.id === pick.resolution) || resList[0]).mult;
      };
      const priceOf = (sec) => Math.ceil((durs.find((d) => d.seconds === sec) || durs[0]).credits * resMult());

      sheetBody.innerHTML = `
        <h3>Настройки видео</h3>
        ${isCurated ? `<div class="quiz-q">Модель</div>
          <div class="chips" id="modRow">${ME.catalog.videoModels.map((v) =>
            `<button class="chip ${v.key === m.key ? "on" : ""}" data-mod="${v.key}">${esc(v.label.replace("🎬 ", ""))} · ${v.credits}+ ${PATRON}</button>`).join("")}</div>` : ""}
        ${scenes.length ? `<div class="quiz-q">Сюжет — что происходит?</div>
          <div class="chips" id="sceneRow">${scenes.map((s) =>
            `<button class="chip ${pick.scene === s.id ? "on" : ""}" data-scene="${s.id}" data-sctier="${s.tier || "simple"}" data-scmodel="${s.videoModelKey}">${esc(s.label)}${s.tier === "epic" ? ` · ⚡${s.videoCredits} ${PATRON}` : ""}</button>`).join("")}</div>
          ${scenes.some((s) => s.tier === "epic") ? `<div class="hint">⚡ — эпичная сцена на движке Seedance (звук и физика)</div>` : ""}` : ""}
        ${ratios.length > 1 ? `<div class="quiz-q">Формат кадра</div>
        <div class="chips" id="arRow">${ratios.map((r) =>
          `<button class="chip ${r === pick.aspect_ratio ? "on" : ""}" data-ar="${r}">${esc(RATIO_LABEL[r] || r)}</button>`).join("")}</div>`
        : `<div class="hint">Формат кадра — как у исходного фото (эта модель не меняет соотношение).</div>`}
        ${resList.length ? `<div class="quiz-q">Качество</div>
        <div class="chips" id="resRow">${resList.map((r) =>
          `<button class="chip ${r.id === pick.resolution ? "on" : ""}" data-res="${r.id}">${esc(r.label)}</button>`).join("")}</div>` : ""}
        <div class="quiz-q">Длительность</div>
        <div class="chips" id="durRow">${durs.map((d) =>
          `<button class="chip ${d.seconds === pick.duration ? "on" : ""}" data-dur="${d.seconds}">${d.seconds}с · ${priceOf(d.seconds)} ${PATRON}</button>`).join("")}</div>
        ${hasEnd ? `<div class="quiz-q">Финальный кадр — переход к другому фото (необязательно)</div>
        <div id="endZone">
          <label class="drop"><input type="file" accept="image/*" id="endFile" />
            <span class="em">🎞</span><b>${pick.end_photo || pick.end_generation_id ? "Кадр выбран ✓" : "Добавить финальный кадр"}</b>
            <span>видео плавно перейдёт к нему</span></label>
          ${myImages().slice(0, 8).length ? `<div class="mini" id="endMini">${myImages().slice(0, 8).map((g) =>
            `<img src="${esc(g.output_url)}" data-egid="${g.id}" class="${pick.end_generation_id === g.id ? "on" : ""}" loading="lazy" alt="" />`).join("")}</div>` : ""}
          ${pick.end_photo || pick.end_generation_id ? `<button class="btn ghost" id="endClear">Убрать финальный кадр</button>` : ""}
        </div>` : ""}
        ${story.map((s) => `
          <div class="quiz-q">${esc(s.question)}</div>
          <div class="chips" data-step="${s.id}">${s.options.map((o) =>
            `<button class="chip ${pick.options.includes(o.id) ? "on" : ""}" data-opt="${o.id}">${esc(o.label)}</button>`).join("")}</div>`).join("")}
        <div class="quiz-q">Детали: хобби, питомец, что любит (необязательно)</div>
        <input class="words" id="cw" maxlength="200" value="${esc(pick.custom || "")}" placeholder="напр.: обожает футбол и собаку Рекса" />
        ${isCurated ? "" : `<div class="quiz-q">Движение (необязательно)</div>
          <textarea class="prompt" id="mp" placeholder="напр.: медленный наезд, волосы на ветру">${esc(pick.prompt || "")}</textarea>`}
        <div class="stack">
          <button class="btn primary" id="goBtn"><span class="priceBadge">Создать · <span id="prN">${priceOf(pick.duration)}</span> ${PATRON}</span></button>
          <button class="btn ghost" id="backBtn">← Назад</button>
        </div>`;

      // Model swap (campaigns): re-render with the chosen model's price/durations.
      sheetBody.querySelectorAll("#modRow .chip").forEach((c) => (c.onclick = () => {
        pick.custom = sheetBody.querySelector("#cw").value.trim(); // preserve typed detail
        const nm = ME.catalog.videoModels.find((v) => v.key === c.dataset.mod);
        if (!nm) return;
        pick.credits = nm.credits;
        viewVideoComposer(nm);
      }));
      // Scene (campaigns): single-select, tap again to clear (→ default motion).
      // An epic scene needs a Seedance engine, so selecting one swaps the model
      // and reprices (mirrors the server's upgrade) — unless we're already on one.
      sheetBody.querySelectorAll("#sceneRow .chip").forEach((c) => (c.onclick = () => {
        const on = c.classList.contains("on");
        sheetBody.querySelectorAll("#sceneRow .chip").forEach((x) => x.classList.remove("on"));
        if (on) { pick.scene = null; return; }
        c.classList.add("on");
        pick.scene = c.dataset.scene;
        if (c.dataset.sctier === "epic" && !pick.model.startsWith("seedance")) {
          pick.custom = sheetBody.querySelector("#cw").value.trim(); // preserve typed detail
          const nm = ME.catalog.videoModels.find((v) => v.key === c.dataset.scmodel);
          if (nm) { pick.credits = nm.credits; viewVideoComposer(nm); }
        }
      }));
      // aspect ratio + duration are single-select (no unselect).
      sheetBody.querySelectorAll("#arRow .chip").forEach((c) => (c.onclick = () => {
        sheetBody.querySelectorAll("#arRow .chip").forEach((x) => x.classList.remove("on"));
        c.classList.add("on"); pick.aspect_ratio = c.dataset.ar;
      }));
      sheetBody.querySelectorAll("#durRow .chip").forEach((c) => (c.onclick = () => {
        sheetBody.querySelectorAll("#durRow .chip").forEach((x) => x.classList.remove("on"));
        c.classList.add("on"); pick.duration = Number(c.dataset.dur);
        sheetBody.querySelector("#prN").textContent = priceOf(pick.duration);
      }));
      // Keep typed fields when a control re-renders the composer for fresh prices.
      const preserveRerender = () => {
        const cw = sheetBody.querySelector("#cw"); if (cw) pick.custom = cw.value.trim();
        const mp0 = sheetBody.querySelector("#mp"); if (mp0) pick.prompt = mp0.value.trim();
        viewVideoComposer(m);
      };
      // Quality tier: re-render so every duration price + the badge reflect the multiplier.
      sheetBody.querySelectorAll("#resRow .chip").forEach((c) => (c.onclick = () => {
        pick.resolution = c.dataset.res; preserveRerender();
      }));
      // End frame: upload a file, pick one of your own works, or clear it.
      const endFile = sheetBody.querySelector("#endFile");
      if (endFile) endFile.onchange = async () => {
        const f = endFile.files && endFile.files[0]; if (!f) return;
        const data = await downscale(f); if (!data) { toast("Не получилось прочитать фото"); return; }
        pick.end_photo = data; pick.end_generation_id = null; preserveRerender();
      };
      sheetBody.querySelectorAll("#endMini img").forEach((im) => (im.onclick = () => {
        pick.end_generation_id = Number(im.dataset.egid); pick.end_photo = null; preserveRerender();
      }));
      const endClear = sheetBody.querySelector("#endClear");
      if (endClear) endClear.onclick = () => { pick.end_photo = null; pick.end_generation_id = null; preserveRerender(); };
      // story chips: one per step, tap again to clear.
      const sel = {};
      sheetBody.querySelectorAll(".chips[data-step]").forEach((row) => {
        row.querySelectorAll(".chip").forEach((chip) => {
          if (chip.classList.contains("on")) sel[row.dataset.step] = chip.dataset.opt;
          chip.onclick = () => {
            const on = chip.classList.contains("on");
            row.querySelectorAll(".chip").forEach((x) => x.classList.remove("on"));
            if (!on) { chip.classList.add("on"); sel[row.dataset.step] = chip.dataset.opt; }
            else delete sel[row.dataset.step];
          };
        });
      });
      sheetBody.querySelector("#backBtn").onclick = () => viewPick();
      sheetBody.querySelector("#goBtn").onclick = () => {
        pick.options = Object.values(sel);
        pick.custom = sheetBody.querySelector("#cw").value.trim();
        const mp = sheetBody.querySelector("#mp");
        if (mp) pick.prompt = mp.value.trim();
        if (pick.needPhoto && !pick.generation_id) viewPhoto(); else run();
      };
    }

    /** Try a model from the news banner — the Studio opens with it preselected. */
    function tryModel(n) {
      openStudio({ mode: n.kind === "image_to_video" ? "video" : "image", modelKey: n.key, origin: "news" });
    }

    /** Sliding model-news banner: cards + auto-advance + dots. */
    function renderNews() {
      const rail = document.getElementById("newsrail"), dots = document.getElementById("newsdots");
      const news = (ME.catalog && ME.catalog.news) || [];
      if (!rail || !news.length) { if (rail) rail.closest(".news").style.display = "none"; return; }
      rail.innerHTML = ""; dots.innerHTML = "";
      news.forEach((n, i) => {
        const card = $(`
          <button class="newscard" data-i="${i}">
            <div class="chiprow"><span class="ntag">${esc(n.tag)}</span>${n.freeTrial ? '<span class="free">🎁 БЕСПЛАТНО</span>' : ""}</div>
            <b>${esc(n.title)}</b>
            <span class="go">Попробовать · ${n.credits} ${PATRON} →</span>
          </button>`);
        card.onclick = () => tryModel(n);
        rail.appendChild(card);
        const dot = $(`<i class="${i === 0 ? "on" : ""}"></i>`);
        dots.appendChild(dot);
      });
      // reflect scroll position in dots; gentle auto-advance every 4s.
      const cards = [...rail.children];
      const setDot = () => {
        const i = Math.round(rail.scrollLeft / (rail.scrollWidth / cards.length));
        [...dots.children].forEach((d, k) => d.classList.toggle("on", k === Math.min(i, cards.length - 1)));
      };
      rail.addEventListener("scroll", setDot, { passive: true });
      if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
        let i = 0;
        setInterval(() => {
          if (!document.body.contains(rail)) return;
          i = (i + 1) % cards.length;
          rail.scrollTo({ left: cards[i].offsetLeft - rail.offsetLeft, behavior: "smooth" });
        }, 4000);
      }
    }

    // ————— paywall: buy Stars packs WITHOUT leaving the app —————
    // Exit-offer shown at most once per app session (growth doctrine #683: the
    // moment the paywall is dismissed is the highest-intent instant to make the
    // best offer). The offer IS the existing combo pack — already ~half the
    // ladder's per-patron price, with a real Kaspi link — no fake discount.
    let exitOfferShown = false;
    function viewPaywall(data) {
      haptic("warning");
      // Arm the exit-offer: closing the paywall (✕ / backdrop) shows the combo
      // once, instead of silently losing the buyer. "Назад" arms it too.
      const combo = (data.packs || []).find((p) => p.offer);
      if (combo && !exitOfferShown) sheetCloseHook = () => viewExitOffer(combo, data);
      sheetBody.innerHTML = `
        <h3>Ещё один шаг до результата ✨</h3>
        <div class="sub">Нужно ${data.need} ${PATRON}, на балансе ${data.balance}. Пополните — и результат сразу продолжит создаваться.</div>
        <div class="packs">${(data.packs || []).map((p, i) => `
          <button class="pack ${i === 1 ? "best" : ""}" data-pk="${p.id}">
            ${i === 1 ? '<span class="hot">Популярный</span>' : ""}
            <span><span class="amount">${PATRON} ${p.credits}</span><div class="per">≈ ${(p.kzt / p.credits).toFixed(0)} ₸ за патрон</div></span>
            <span class="stars">${p.kzt.toLocaleString("ru-RU")} ₸</span>
          </button>`).join("")}</div>
        <div class="row"><button class="btn ghost" id="backBtn">← Назад</button></div>`;
      sheetBody.querySelector("#backBtn").onclick = () => { if (sheetCloseHook) { closeSheet(); } else viewPick(); };
      sheetBody.querySelectorAll("[data-pk]").forEach((b) => (b.onclick = () => { sheetCloseHook = null; buyPack(b.dataset.pk); }));
    }

    /** The paywall exit-offer: the combo pack, one choice, honest math. */
    function viewExitOffer(combo, paywallData) {
      exitOfferShown = true;
      haptic("warning");
      const ladder = (paywallData.packs || []).filter((p) => !p.offer);
      const ladderPer = ladder.length ? Math.min(...ladder.map((p) => p.kzt / p.credits)) : 0;
      const per = combo.kzt / combo.credits;
      const saving = ladderPer ? Math.round((1 - per / ladderPer) * 100) : 0;
      openSheet();
      sheetBody.innerHTML = `
        <h3>Подождите — спецпредложение 🎁</h3>
        <div class="sub">Только для новых покупок: <b>${combo.credits} ${PATRON} за ${combo.kzt.toLocaleString("ru-RU")} ₸</b>
        — ≈${per.toFixed(0)} ₸ за патрон${saving > 0 ? ` (выгода ${saving}% к обычной цене)` : ""}.
        Хватит на ${Math.floor(combo.credits / Math.max(1, paywallData.need)) || 1}× ваш текущий запрос.</div>
        <div class="stack">
          <button class="btn primary" id="exGo">🔥 Забрать за ${combo.kzt.toLocaleString("ru-RU")} ₸</button>
          <button class="btn ghost" id="exNo">Не сейчас</button>
        </div>`;
      sheetBody.querySelector("#exGo").onclick = () => buyPack(combo.id);
      sheetBody.querySelector("#exNo").onclick = () => closeSheet();
    }

    // Kaspi purchase — handled entirely IN the app (same flow as the bot): create
    // a pending order, open the Kaspi pay link, then show an in-app «✅ Я оплатил»
    // button. Tapping it hits /api/order/paid → server verifies with Kaspi and
    // auto-credits, or pings an admin to approve — no need to switch to the bot.
    async function buyPack(packId) {
      const { status, data } = await api("/api/order", { method: "POST", body: JSON.stringify({ pack: packId }) });

    // ————— "Ваш путь в NeuroShot" roadmap — shared by the initial render and
    // the live refresh below, so a step's checkmark shows up right after the
    // job that completes it, not only after a full page reload. —————
    function roadmapStepsFor(d) {
      const rm = d.roadmap || {};
      return [
        { go: "shoot", icon: "camera", label: "Первое фото", done: !!rm.firstPhoto },
        { go: "text", icon: "sparkle", label: "Своя идея", done: !!rm.ownIdea },
        { go: "video", icon: "film", label: "Оживите фото", done: !!rm.revivePhoto },
        { go: "scenes", icon: "confetti", label: "Сценарий", done: !!rm.scenario },
        { go: "friends", icon: "gift", label: "Пригласить друга", done: (d.dashboard.referralCount || 0) > 0 },
      ];
    }
    function roadmapStepsHtml(steps) {
      return steps.map((s) => `
        <button class="rstep ${s.done ? "done" : ""}" data-go="${s.go}">
          <span class="rico">${s.done ? "✓" : `<img class="appicon" src="/img/ic-${s.icon}.png" alt="" />`}</span>
          <span class="rlabel">${esc(s.label)}</span>
        </button>`).join("");
    }
    /** The reward note/claim button under the checklist — visible before AND
     *  after completion, so the incentive is never a secret. */
    function roadmapBonusHtml(d, steps) {
      const rb = d.roadmapBonus || { amount: 0, claimed: true };
      if (rb.claimed || rb.amount <= 0) return "";
      if (steps.every((s) => s.done)) {
        return `<button class="rmclaim" id="rmclaimbtn">🎁 Забрать ${rb.amount} ${PATRON} — путь пройден!</button>`;
      }
      return `<p class="rmnote">Пройдите все 5 шагов — получите <b>${rb.amount} ${PATRON}</b> в подарок</p>`;
    }
    /** The onboarding path has served its purpose once every step is done AND the
     *  completion bonus is claimed (or there was none) — nothing left to nudge. */
    function roadmapGraduated(d, steps) {
      const rb = d.roadmapBonus || { amount: 0, claimed: true };
      return steps.every((s) => s.done) && (rb.claimed || rb.amount <= 0);
    }
    /** Inner markup of the .roadmap card. Two states so the same builder drives
     *  the first paint and every live refresh: the full checklist while there's
     *  still a step or bonus outstanding, and a slim graduated row once it's all
     *  done — so the completed card stops hogging the top of the studio. */
    function roadmapCardInner(d, steps) {
      if (roadmapGraduated(d, steps)) {
        return `<button class="rmgrad" data-go="shoot">
            <span class="rico">🎉</span>
            <span class="rgtx">Путь пройден — вы освоили студию<small>Нажмите, чтобы создать ещё</small></span>
          </button>`;
      }
      return `
          <div class="sec-h"><h2>Ваш путь в NeuroShot</h2></div>
          <div class="rsteps">${roadmapStepsHtml(steps)}</div>
          <div id="rmbonus">${roadmapBonusHtml(d, steps)}</div>`;
    }
    function bindRoadmap() {
      document.querySelectorAll(".rstep[data-go]").forEach((b) => (b.onclick = () => {
        if (b.dataset.go === "friends") showPage("friends"); else studio(b.dataset.go);
      }));
      const grad = document.querySelector(".roadmap .rmgrad");
      if (grad) grad.onclick = () => studio("shoot");
      const claimBtn = document.getElementById("rmclaimbtn");
      if (claimBtn) claimBtn.onclick = async function () {
        this.disabled = true;
        const { status, data } = await api("/api/claim-roadmap", { method: "POST" });
        if (status === 200 && data && data.granted > 0) {
          setBalance((ME?.dashboard.credits || 0) + data.granted);
          haptic("success");
          toast(`🎁 +${data.granted} ${PATRON} за пройденный путь!`);
          await refreshMe();
        } else {
          this.disabled = false;

    /** Re-render just the roadmap card (+ its "Ещё" tab counter) from fresh
     *  /api/me data, without rebuilding the whole page (which would reset the
     *  active tab and any open sheet). */
    function renderRoadmap(d) {
      const steps = roadmapStepsFor(d);
      const card = document.querySelector(".roadmap");
      if (card) {
        card.classList.toggle("graduated", roadmapGraduated(d, steps));
        card.innerHTML = roadmapCardInner(d, steps);
      }
      bindRoadmap();
      const small = document.getElementById("moreRoadmap")?.querySelector("small");
      if (small) small.textContent = `${steps.filter((s) => s.done).length} из ${steps.length} шагов пройдено`;

    // Live combo-offer countdown: ticks the 🔥 badge each second; when the
    // deadline passes the offer pack removes itself from the list.
    function fmtLeft(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
      if (d > 0) return `${d}д ${h}ч ${m}м`;
      if (h > 0) return `${h}ч ${m}м ${ss}с`;
      return `${m}м ${ss}с`;
    }
    let cdTimer = null;
    function tickCountdowns() {
      document.querySelectorAll("[data-countdown]").forEach((el) => {
        const left = Number(el.dataset.countdown) - Date.now();
        if (left <= 0) { const pk = el.closest(".pack"); if (pk) pk.remove(); }
        else el.textContent = "🔥 Акция · " + fmtLeft(left);
      });
    }
    function startCountdown() {
      tickCountdowns();
      if (cdTimer) clearInterval(cdTimer);
      cdTimer = setInterval(tickCountdowns, 1000);
    }
    // Paginated «Мои работы»: a fixed grid region + a pager. Each page is fetched
    // from /api/generations so the section stays put and long histories stay light.
    var GAL_PAGE = 1, GAL_PAGES = 1;
    const GAL_SIZE = 12; // 3×4 — matches the fixed region height
    async function renderGallery(page) {
      const g = document.getElementById("g");
      if (!g) return;
      const want = Math.max(1, page || GAL_PAGE);
      let items = [], total = 0, cur = want;
      try {
        const { status, data } = await api("/api/generations?page=" + want + "&size=" + GAL_SIZE);
        if (status === 200) { items = data.items || []; total = data.total || 0; cur = data.page || want; GAL_PAGES = data.pages || 1; }
      } catch (e) { /* keep the last rendered page on a transient error */ }
      GAL_PAGE = cur;
      g.innerHTML = "";
      // In-flight renders lead the grid (page 1) as ripple cards — reload-safe
      // (jobs is re-hydrated from /api/me pending rows), so a render in progress
      // is never invisible: no more "did it break?" after a page refresh.
      if (cur === 1) {
        for (const job of [...jobs.values()].reverse()) {
          g.appendChild($(`<div class="shot pending" role="status" aria-label="Генерируется">
            <span class="rip"></span><span class="rip"></span><span class="rip"></span>
            <span class="tag">⏳ ${job.isVideo ? "видео" : "создаётся"}</span></div>`));
        }
      }
      if (!items.length && !(cur === 1 && jobs.size)) {
        g.appendChild($(`<div class="empty">Пока пусто.<br>Создайте первую работу — она появится здесь ✨</div>`));
      }
      for (const item of items) {
        const isVideo = /\.(mp4|webm|mov)(\?|$)/i.test(item.output_url);
        const media = isVideo
          ? `<video src="${esc(item.output_url)}" muted loop playsinline autoplay preload="metadata"></video><span class="tag">видео</span>`
          : `<img loading="lazy" src="${esc(item.output_url)}" alt="" />`;
        const el = $(`<a class="shot" href="#" role="button">${media}</a>`);
        el.onclick = (e) => { e.preventDefault(); openViewer(item); }; // viewer: save / chat / animate
        g.appendChild(el);
      }
      renderPager();
    }
    function renderPager() {
      const p = document.getElementById("pager");
      if (!p) return;
      p.innerHTML = "";
      if (GAL_PAGES <= 1) return; // single page → no controls
      const prev = $(`<button aria-label="Назад">‹</button>`);
      prev.disabled = GAL_PAGE <= 1;
      prev.onclick = () => { if (GAL_PAGE > 1) renderGallery(GAL_PAGE - 1); };
      const info = $(`<span class="pinfo">${GAL_PAGE} / ${GAL_PAGES}</span>`);
      const next = $(`<button aria-label="Вперёд">›</button>`);
      next.disabled = GAL_PAGE >= GAL_PAGES;
      next.onclick = () => { if (GAL_PAGE < GAL_PAGES) renderGallery(GAL_PAGE + 1); };
      p.append(prev, info, next);

              видео-сюжет.</p>
              <div class="steps3">
                <div class="s"><div class="ic"><img class="appicon" src="/img/ic-camera.png" alt="" /></div><small>Фото</small></div>
                <div class="ar">→</div>
                <div class="s"><div class="ic"><img class="appicon" src="/img/ic-palette.png" alt="" /></div><small>Стиль</small></div>
                <div class="ar">→</div>
                <div class="s"><div class="ic"><img class="appicon" src="/img/ic-sparkle.png" alt="" /></div><small>Результат</small></div>
              </div>
              <div class="valuebar"><span class="em"><img class="appicon" src="/img/ic-patron.png" alt="" /></span><p>Патрон — внутренняя валюта: от 2 ${PATRON} за фото, от 10 ${PATRON} за видео. Чем больше пакет — тем дешевле патрон.</p></div>
              <div class="valuebar"><span class="em">🤝</span><p><b>Честные патроны.</b> Не сгорают, без подписок-ловушек и фейкового «безлимита» — платите только за готовый результат.</p></div>
              <button class="btn primary" id="aboutCta">✨ Начать создавать</button>
            </div>
          </section>

          <section class="reveal">
            <div class="sec-h"><h2>Друзья</h2></div>
            <div class="lnkrow" id="moreFriends"><span class="ic"><img class="appicon" src="/img/ic-gift.png" alt="" /></span><span class="tx">Реферальная программа<small>приглашено ${dash.referralCount} · заработано ${dash.referralEarned} ${PATRON}</small></span><span class="chev">›</span></div>
          </section>

          <section class="reveal">
            <div class="sec-h"><h2>Помощь</h2></div>
            <div class="lnkrow" id="moreSupport"><span class="ic"><img class="appicon" src="/img/ic-chat.png" alt="" /></span><span class="tx">Написать в бот<small>@${esc(BOT)} — отвечаем в чате</small></span><span class="chev">›</span></div>
          </section>

          <section class="reveal">
            <div class="sec-h"><h2>О проекте</h2></div>
            <div class="lnkrow" id="moreRoadmap"><span class="ic"><img class="appicon" src="/img/ic-compass.png" alt="" /></span><span class="tx">Ваш путь в NeuroShot<small>${ROADMAP_STEPS.filter((s) => s.done).length} из ${ROADMAP_STEPS.length} шагов пройдено</small></span><span class="chev">›</span></div>
            <div class="lnkrow" id="moreWelcome"><span class="ic"><img class="appicon" src="/img/ic-book.png" alt="" /></span><span class="tx">Обзор NeuroShot<small>Заново посмотреть введение в продукт</small></span><span class="chev">›</span></div>
          </section>

          <section class="reveal">
            <div class="sec-h"><h2>Связаться</h2></div>
            <div class="lnkrow" id="moreContact"><span class="ic"><img class="appicon" src="/img/ic-plane.png" alt="" /></span><span class="tx">Telegram-бот<small>@${esc(BOT)}</small></span><span class="chev">›</span></div>
          </section>
        </div>

        <nav class="tabbar">
          <button class="tabbtn on" data-page="studio"><span><img class="appicon" src="/img/ic-palette.png" alt="" /></span>Студия</button>
          <button class="tabbtn" data-page="profile"><span><img class="appicon" src="/img/ic-frame.png" alt="" /></span>Профиль</button>
          <button class="tabbtn" data-page="friends"><span><img class="appicon" src="/img/ic-gift.png" alt="" /></span>Друзья</button>
          <button class="tabbtn" data-page="buy"><span><img class="appicon" src="/img/ic-patron.png" alt="" /></span>Патроны</button>
          <button class="tabbtn" data-page="more"><span><img class="appicon" src="/img/ic-dots.png" alt="" /></span>Ещё</button>
        </nav>
      </div>`));

      resumePending(); // re-hydrate in-flight renders BEFORE the first gallery paint
      renderGallery();
      renderNews();

      const p = document.getElementById("p");
      // Offer packs (the limited-time combo) lead with a live countdown badge;
      // once the deadline passes the offer drops out of the list entirely.
      const comboEndsAt = d.comboOffer?.endsAt || 0;
      const packsOrdered = [...(d.packs || [])]
        .filter((pack) => !(pack.offer && comboEndsAt && comboEndsAt <= Date.now()))
        .sort((a, b) => Number(b.offer) - Number(a.offer));
      for (const pack of packsOrdered) {
        const per = (pack.kzt / pack.credits).toFixed(0);
        const badge = pack.offer
          ? `<span class="hot" data-countdown="${comboEndsAt}">🔥 Акция</span>`
          : pack.id === bestPack ? '<span class="hot">Популярный</span>' : "";
        p.appendChild($(`
          <button class="pack ${pack.offer || pack.id === bestPack ? "best" : ""}" data-buy="${pack.id}">
            ${badge}
            <span><span class="amount">${PATRON} ${pack.credits}</span><div class="per">≈ ${per} ₸ за патрон</div></span>
            <span class="stars">${pack.kzt.toLocaleString("ru-RU")} ₸</span>
          </button>`));
      }
      // Exchange-rate transparency: the patron↔tenge rate is a ladder (bigger
      // pack = cheaper), so show its range up front rather than making the user
      // reverse-engineer it from the pack tiles.
      const rn = document.getElementById("rateNote");
      if (rn) {
        const rates = (d.packs || []).filter((p) => !p.offer).map((p) => p.kzt / p.credits);
        if (rates.length) {
          const minR = Math.round(Math.min(...rates)), maxR = Math.round(Math.max(...rates));
          rn.textContent = `1 ${PATRON} ≈ ${minR === maxR ? `${minR}` : `${minR}–${maxR}`} ₸ — чем больше пакет, тем дешевле`;
        }
      }
      startCountdown();

      document.getElementById("jobsPill").onclick = () => {
        const job = [...jobs.values()].at(-1);
        if (job) { viewedJob = job.id; viewProgress(job.isVideo, job.id); }
      };
      document.getElementById("balancePill").onclick = () => showPage("buy");
      document.querySelectorAll("[data-buy]").forEach((b) => (b.onclick = () => buyPack(b.dataset.buy, false)));
      document.querySelectorAll("[data-studio]").forEach((a) => (a.onclick = () => studio(a.dataset.studio)));
      document.querySelectorAll("[data-camp-open]").forEach((a) => (a.onclick = () => { st.tab = "scenes"; openSheet(); viewCampaign(a.dataset.campOpen); }));
      // Roadmap steps are the same entry points as "Что создаём" — either into
      // the studio sheet on a given tab, or the Друзья page for the invite step
      // — plus the completion-bonus claim button (see renderRoadmap for the
      // live-refresh path after a job finishes).
      bindRoadmap();
      // "Ещё" tab links.
      const aboutCta = document.getElementById("aboutCta");
      if (aboutCta) aboutCta.onclick = () => studio("shoot");
      const moreFriends = document.getElementById("moreFriends");
      if (moreFriends) moreFriends.onclick = () => showPage("friends");
      const moreRoadmap = document.getElementById("moreRoadmap");
      if (moreRoadmap) moreRoadmap.onclick = () => {
        showPage("studio");
        document.querySelector(".roadmap")?.scrollIntoView({ behavior: "smooth", block: "start" });
      };
      const moreWelcome = document.getElementById("moreWelcome");
      if (moreWelcome) moreWelcome.onclick = async () => {
        await refreshMe();
        renderWelcome(ME, true);
      };
      const moreSupport = document.getElementById("moreSupport");
      if (moreSupport) moreSupport.onclick = () => openBot(BOT);
      const moreContact = document.getElementById("moreContact");
      if (moreContact) moreContact.onclick = () => openBot(BOT);
      document.getElementById("refC").onclick = async () => {
        try { await navigator.clipboard.writeText(refLink); } catch (e) { /* ignore */ }
        document.getElementById("refC").textContent = "Скопировано ✓";
        setTimeout(() => (document.getElementById("refC").textContent = "Копировать"), 1600);
      };
      const wm = document.getElementById("wmToggle");
      if (wm) wm.onchange = async () => {
        const on = wm.checked;
        const { status, data } = await api("/api/settings", { method: "POST", body: JSON.stringify({ watermark: on }) });
        if (status === 200) { haptic("light"); toast(data.watermark ? "🏷 Водяной знак включён" : "Водяной знак выключен"); }
        else { wm.checked = !on; toast("Не удалось сохранить"); }
      };

      // Bottom-tab router. Hidden pages aren't observed by reveal(), so force
      // their sections visible on show; scroll back to the top on each switch.
      window.showPage = (id) => {
        document.querySelectorAll(".page").forEach((p) => p.classList.toggle("on", p.dataset.page === id));
        document.querySelectorAll(".tabbtn").forEach((b) => b.classList.toggle("on", b.dataset.page === id));
        document.querySelectorAll(`.page[data-page="${id}"] .reveal`).forEach((e) => e.classList.add("on"));
        window.scrollTo({ top: 0, behavior: "instant" });
        haptic("light");
      };
      document.querySelectorAll(".tabbtn").forEach((b) => (b.onclick = () => showPage(b.dataset.page)));

      reveal();
    }
    load();
  </script>
</body>
</html>
